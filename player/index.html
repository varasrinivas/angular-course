/* ── MOD 3.6 ── */
{
  id: "3.6",
  track: 3,
  title: "Advanced DI: Tokens & Providers",
  duration: "60 min",
  objectives: [
    "Replace hard-coded configuration with an InjectionToken and provide a different value per environment",
    "Choose the right provider shape — useValue, useClass, useFactory with deps, useExisting — for a given wiring problem",
    "Build a pluggable ClinicalCriteria rule set with multi providers that consumers receive as a typed array",
    "Predict which instance an inject() call resolves by walking the injector hierarchy",
    "Steer resolution deliberately with the optional, self, and skipSelf options"
  ],
  sections: [
    { heading: "Why a token, not a string import",
      html: `
<p>Since module 2.1, <code>AuthRequestService</code> has been calling the NestJS backend with a hard-coded <code>'/api'</code> prefix. That string is about to become a liability three times over: the staging build needs a different host (module 6.1), tests want a fake, and in Track 4 the portal splits into micro-frontends — <code>pa-review-queue</code> deployed by one team may point at a different API host than <code>pa-intake</code>, even while both run inside <code>pa-shell</code>.</p>
<p>You might reach for an exported constant. But an <code>import</code> is resolved at <strong>build time</strong>: every consumer gets the same value, forever, baked into the bundle. What we want is a value resolved at <strong>injection time</strong>, so whoever configures the injector decides. Classes get this for free because the class itself is the DI key. For a plain string there is no class — so Angular gives us a way to mint a key: <code>InjectionToken</code>.</p>
<pre><code class="language-ts">// src/app/core/api-base-url.token.ts
import { InjectionToken } from '@angular/core';

export const API_BASE_URL = new InjectionToken&lt;string&gt;('API_BASE_URL', {
  providedIn: 'root',
  factory: () =&gt; '/api',   // default for local dev against the NestJS backend
});

// src/app/data/auth-request.service.ts — the 2.1 service, upgraded
@Injectable({ providedIn: 'root' })
export class AuthRequestService {
  private readonly http = inject(HttpClient);
  private readonly baseUrl = inject(API_BASE_URL);

  getQueue() {
    return this.http.get&lt;AuthRequest[]&gt;(this.baseUrl + '/auth-requests?status=IN_REVIEW');
  }
}</code></pre>
<p>The generic parameter matters: <code>InjectionToken&lt;string&gt;</code> makes <code>inject(API_BASE_URL)</code> return <code>string</code>, fully typed. The tree-shakable <code>factory</code> is the default; any provider you register later wins over it. The service asks <em>what</em> it needs; it no longer knows <em>where</em> the value comes from.</p>
<div class="callout">A token separates the question from the answer. The consumer asks once; every environment, test, and micro-frontend gets to answer differently.</div>`
    },
    { heading: "Provider shapes: four ways to answer the injector",
      html: `
<p>A provider is a recipe: "when someone asks for this token, produce the value like so." Different wiring problems need different recipes, and picking the wrong shape is how you end up with two instances of a service that should have been one.</p>
<table><tr><th>Shape</th><th>Produces</th><th>Prior Auth use</th></tr>
<tr><td><code>useValue</code></td><td>A ready-made value, no construction</td><td>Pin <code>API_BASE_URL</code> for the staging build</td></tr>
<tr><td><code>useFactory</code></td><td>Whatever the function returns; <code>deps</code> are injected as arguments</td><td>Read the base URL from runtime config fetched before bootstrap</td></tr>
<tr><td><code>useClass</code></td><td>A new instance of a different class</td><td>Swap in a demo-mode <code>AuthRequestService</code> for sales environments</td></tr>
<tr><td><code>useExisting</code></td><td>An alias — resolves another token, no new instance</td><td>Expose <code>ClinicalCriteriaService</code> under a narrower token</td></tr></table>
<pre><code class="language-ts">// app.config.ts — environment and test wiring in one place
export const appConfig: ApplicationConfig = {
  providers: [
    // useValue — the simplest override; beats the token's default factory:
    { provide: API_BASE_URL, useValue: 'https://staging.pa-portal.example/api' },

    // useFactory + deps — computed from other injectables at injector creation:
    {
      provide: API_BASE_URL,
      useFactory: (cfg: RuntimeConfigService) =&gt; cfg.get('apiBaseUrl'),
      deps: [RuntimeConfigService],
    },

    // useClass — same token, different implementation (new instance):
    { provide: AuthRequestService, useClass: DemoAuthRequestService },

    // useExisting — two tokens, ONE instance. useClass here would silently
    // create a second copy with its own state:
    { provide: CriteriaEvaluator, useExisting: ClinicalCriteriaService },
  ],
};</code></pre>
<p>The <code>useExisting</code> vs <code>useClass</code> distinction is the classic trap: if a component injects <code>CriteriaEvaluator</code> and a store injects <code>ClinicalCriteriaService</code>, <code>useClass</code> gives them <em>different objects</em>. Cached criteria results in one never appear in the other. <code>useExisting</code> makes both tokens resolve to the same instance.</p>`
    },
    { heading: "multi: true — a pluggable set of criteria validators",
      html: `
<p>The review panel evaluates an <code>AuthRequest</code> against <code>ClinicalCriteria</code> rules: is the <code>Member</code> still eligible, is the <code>Provider</code> in network, does the <code>confidenceScore</code> clear the auto-approve bar? Medical policy adds rules quarterly. If the panel imports each validator, every new rule means editing the panel — the team that owns rules and the team that owns UI are coupled.</p>
<p><code>multi: true</code> inverts that. Many providers register under one token, each contributing one element; the consumer injects the token once and receives the <strong>array</strong> of all contributions.</p>
<pre><code class="language-ts">// src/app/criteria/criteria-validator.ts
export interface CriteriaFinding {
  rule: string;
  passed: boolean;
  detail: string;
}

export interface CriteriaValidator {
  readonly name: string;
  evaluate(req: AuthRequest): CriteriaFinding;
}

export const CRITERIA_VALIDATORS =
  new InjectionToken&lt;readonly CriteriaValidator[]&gt;('CRITERIA_VALIDATORS');

// One rule, one class. AUTO_APPROVE_THRESHOLD from module 1.1 is load-bearing:
@Injectable({ providedIn: 'root' })
export class ConfidenceScoreValidator implements CriteriaValidator {
  readonly name = 'confidence-score';
  evaluate(req: AuthRequest): CriteriaFinding {
    const passed = req.confidenceScore &gt;= AUTO_APPROVE_THRESHOLD;
    return { rule: this.name, passed,
             detail: passed ? 'Eligible for auto-approval' : 'Requires nurse review' };
  }
}

// Registration — each line is one pluggable rule:
export const criteriaProviders = [
  { provide: CRITERIA_VALIDATORS, useClass: EligibilityValidator,     multi: true },
  { provide: CRITERIA_VALIDATORS, useClass: NetworkStatusValidator,   multi: true },
  { provide: CRITERIA_VALIDATORS, useClass: ConfidenceScoreValidator, multi: true },
];

// The consumer never names a concrete rule:
@Component({ selector: 'pa-criteria-panel', template: '...' })
export class CriteriaPanelComponent {
  private readonly validators = inject(CRITERIA_VALIDATORS);
  readonly request = input.required&lt;AuthRequest&gt;();
  readonly findings = computed(() =&gt;
    this.validators.map(v =&gt; v.evaluate(this.request())));
}</code></pre>
<p>Adding a fourth rule is one provider line in the registration array — the panel, its template, and its tests are untouched. Two sharp edges: every provider for the token must say <code>multi: true</code> (mixing multi and regular providers for one token throws at runtime), and Angular's HTTP interceptors and route guards use exactly this pattern, so you have been consuming multi providers since module 2.5.</p>`
    },
    { heading: "The injector hierarchy: root, route, component",
      html: `
<p>Providers do not live in one global bag. There is a tree of injectors, and where you register decides both <em>who can see</em> a provider and <em>how many instances</em> exist. Get this wrong and two components silently work with two copies of a store.</p>
<p>Three levels matter in the portal:</p>
<pre><code class="language-ts">// 1. Root environment injector — providedIn: 'root' or app.config.ts.
//    One instance for the whole app: AuthRequestService, API_BASE_URL.

// 2. Route-level providers — a child environment injector for that subtree:
export const routes: Routes = [
  {
    path: 'queue',
    providers: [ReviewQueueStore],   // the 3.2 store, scoped to this route
    loadComponent: () =&gt; import('./review-queue/review-queue')
      .then(m =&gt; m.ReviewQueueComponent),
  },
];

// 3. Component providers — an element injector; one instance PER component:
@Component({
  selector: 'pa-panel',
  providers: [PanelStateService],    // each 3.4 PanelComponent gets its own
  template: '...',
})
export class PanelComponent { }</code></pre>
<p>When <code>inject()</code> runs, resolution <strong>walks</strong>: it starts at the element injector of the requesting component, climbs parent elements, then hands off to the environment injector chain (route injectors, then root). The <em>first</em> injector holding a provider for the token answers — and the walk stops. That has a consequence for multi tokens: if <code>PanelComponent</code> provides its own <code>CRITERIA_VALIDATORS</code>, children inside it see <em>only</em> the panel's set. Multi arrays do not merge across levels; the nearest level shadows everything above it. That shadowing is a feature — a specialized expedited-review panel can run a stricter rule set — but it must be chosen, not stumbled into.</p>`
    },
    { heading: "Steering the walk: optional, self, skipSelf",
      html: `
<p>Sometimes the default walk is wrong. A missing provider normally throws <code>NullInjectorError</code> at the top of the tree — but the <code>paPermission</code> directive from 3.5 should degrade gracefully when no role context exists. A nested panel must find its <em>parent</em> panel, not itself. <code>inject()</code> takes options for exactly these cases:</p>
<pre><code class="language-ts">// optional — return null instead of throwing when nothing provides the token:
const roleContext = inject(REVIEWER_ROLE, { optional: true });
// paPermission hides the Deny button when roleContext is null.

// skipSelf — start the walk at the PARENT injector. A nested PanelComponent
// registers with its enclosing panel, but must also work at top level:
export class PanelComponent {
  private readonly parent = inject(PanelComponent, { skipSelf: true, optional: true });
  constructor() {
    if (this.parent !== null) { this.parent.registerChild(this); }
  }
}

// self — do NOT walk; only this component's own injector may answer:
const ownValidators = inject(CRITERIA_VALIDATORS, { self: true, optional: true });
// null means 'this panel declared no local rule set' — the root set was
// deliberately NOT consulted.</code></pre>
<p>Note the pairing discipline: <code>self</code> and <code>skipSelf</code> almost always travel with <code>optional: true</code>, because restricting the walk makes "not found" a normal outcome rather than a crash. And without <code>skipSelf</code>, a component injecting its own class token finds <em>itself</em> — the element injector exposes the component instance, which is never the parent you wanted.</p>`
    },

<p>The <code>CRITERIA_VALIDATORS</code> multi token is how the review panel stays open for extension: the findings it produces feed the <code>ReviewQueueStore</code> decision logic from 3.2, where <code>AUTO_APPROVE_THRESHOLD</code> (0.85) decides whether an <code>IN_REVIEW</code> request can skip the nurse queue. And the injector-walking rules you learned here are the mental model for 3.7's <code>TestBed</code>, which is nothing more than a configurable injector you rebuild per spec.</p>`

<p>Most Angular test suites rot for one reason: they assert implementation. A spec that checks <code>component.isDenied === true</code> passes while the template renders the wrong badge — and breaks the day you rename a private field, even though the portal still works. In a prior authorization tool, the only truth that matters is what the nurse reviewer sees and does: a <code>DENIED</code> request shows a DENIED badge; clicking Approve tells the parent which <code>AuthRequest</code> was approved.</p>
<p>So the rule for this module: <strong>assert through the same surfaces the user and the parent component use</strong> — the rendered DOM, emitted outputs, and HTTP requests actually issued. Private fields, internal signals, and call counts on your own methods are off limits. This is why we layer Angular Testing Library on top of TestBed: its query API (<code>getByRole</code>, <code>getByText</code>) physically steers you toward user-visible assertions.</p>
<div class="callout">A spec should fail for exactly one reason: the behavior a user or a consumer depends on changed. If a refactor with identical behavior breaks a test, the test was wrong.</div>`

    { heading: "TestBed with standalone components and signal inputs",
      html: `
<p><code>TestBed</code> builds a miniature Angular injector and compiler per spec. Since 1.7 our components are standalone, so they go in <code>imports</code> — there is no declarations array anymore. The friction point in Angular 20 is inputs: <code>AuthRequestCardComponent</code> uses the signal API <code>request = input.required&lt;AuthRequest&gt;()</code> (module 2.8), and a signal input is not a writable property — assigning <code>component.request = value</code> is a type error. The supported write path is <code>fixture.componentRef.setInput</code>, which routes through the same mechanism the parent template uses and marks the component for check:</p>
<pre><code class="language-ts">// auth-request-card.component.spec.ts
import { TestBed, ComponentFixture } from '@angular/core/testing';
import { provideZonelessChangeDetection } from '@angular/core';
import { AuthRequestCardComponent } from './auth-request-card.component';
import { deniedRequest } from '../../testing/auth-request.fixtures';

describe('AuthRequestCardComponent (TestBed)', () =&gt; {
  let fixture: ComponentFixture&lt;AuthRequestCardComponent&gt;;

  beforeEach(async () =&gt; {
    await TestBed.configureTestingModule({
      imports: [AuthRequestCardComponent],          // standalone: imports, not declarations
      providers: [provideZonelessChangeDetection()] // match the app from 3.3
    }).compileComponents();
    fixture = TestBed.createComponent(AuthRequestCardComponent);
  });

  it('renders the DENIED badge for a denied request', async () =&gt; {
    fixture.componentRef.setInput('request', deniedRequest);
    await fixture.whenStable();                     // zoneless: let scheduled CD run
    const badge = fixture.nativeElement.querySelector('[data-status-badge]');
    expect(badge.textContent.trim()).toBe('DENIED');
  });
});</code></pre>
<p>Two details carry over from 3.3: under zoneless change detection there is no Zone to flush, so prefer <code>await fixture.whenStable()</code> over sprinkling manual <code>fixture.detectChanges()</code> calls; and because signal inputs mark the component dirty themselves, <code>setInput</code> then awaiting stability is the whole update cycle — no fakeAsync, no tick.</p>`

<p>Raw TestBed makes you query by CSS selector — an implementation detail. Angular Testing Library (<code>@testing-library/angular</code>) wraps TestBed and gives you queries by <em>role and accessible name</em>, which is how the reviewer's screen reader finds the button too. One install, and specs read like the workflow they protect:</p>
<pre><code class="language-ts">// auth-request-card.component.atl.spec.ts
import { render, screen } from '@testing-library/angular';
import userEvent from '@testing-library/user-event';
import { AuthRequestCardComponent } from './auth-request-card.component';
import { inReviewRequest, deniedRequest } from '../../testing/auth-request.fixtures';

  const approve = jasmine.createSpy('approve output');
  await render(AuthRequestCardComponent, {
    inputs: { request: inReviewRequest },   // ATL calls setInput for you
    on: { approve }                          // subscribes to the output() from 2.8
  });

  await userEvent.click(screen.getByRole('button', { name: /approve/i }));

<p><code>userEvent.click</code> dispatches the full pointer-then-click event sequence a real click produces, and ATL awaits change detection after it — no fixture bookkeeping. Note the two query flavors: <code>getByRole</code> throws with a readable error when the element is missing (assert presence), <code>queryByRole</code> returns null (assert absence). Asserting that Approve is <em>gone</em> on a decided request is exactly the kind of user-visible negative case selector-based specs forget.</p>`

    { heading: "Service specs with HttpTestingController",
      html: `
<p><code>AuthRequestService</code> (2.1, 2.5) is where a wrong URL or a missed status filter silently corrupts the review queue. Hitting the real NestJS API in unit tests is slow and flaky; mocking <code>HttpClient</code> by hand asserts nothing about the actual request. <code>provideHttpClientTesting()</code> replaces the HTTP backend with <code>HttpTestingController</code>: your service runs its real code path, and the spec intercepts, inspects, and answers each request.</p>
<pre><code class="language-ts">// auth-request.service.spec.ts
import { TestBed } from '@angular/core/testing';
import { provideHttpClient } from '@angular/common/http';
import { provideHttpClientTesting, HttpTestingController } from '@angular/common/http/testing';
import { AuthRequestService } from './auth-request.service';
import { inReviewRequest } from '../testing/auth-request.fixtures';

describe('AuthRequestService', () =&gt; {
  let service: AuthRequestService;
  let httpTesting: HttpTestingController;

  beforeEach(() =&gt; {
    TestBed.configureTestingModule({
      providers: [provideHttpClient(), provideHttpClientTesting()]
    });
    service = TestBed.inject(AuthRequestService);
    httpTesting = TestBed.inject(HttpTestingController);
  });

  afterEach(() =&gt; httpTesting.verify());  // fails the spec on unmatched requests

  it('requests the IN_REVIEW queue and maps the response', () =&gt; {
    let rows: unknown;
    service.getQueue('IN_REVIEW').subscribe(r =&gt; (rows = r));

    const req = httpTesting.expectOne('/api/auth-requests?status=IN_REVIEW');
    expect(req.request.method).toBe('GET');
    req.flush([inReviewRequest]);

    expect(rows).toEqual([inReviewRequest]);
  });

  it('surfaces a typed error when the decision PATCH fails', () =&gt; {
    let error: unknown;
    service.deny(inReviewRequest.id, 'criteria not met').subscribe({ error: e =&gt; (error = e) });

    httpTesting.expectOne('/api/auth-requests/PA-2041/decision')
      .flush({ message: 'request already PENDED' }, { status: 409, statusText: 'Conflict' });

    expect(error).toBeTruthy();
  });
});</code></pre>
<p>Order matters: subscribe first (nothing is sent until then), <code>expectOne</code> to capture, assert on <code>req.request</code>, then <code>flush</code> to deliver the body synchronously. The <code>verify()</code> in afterEach is the quiet hero — it catches the request your code made that no expectation matched, which is how URL regressions get caught.</p>`

<p>Reading a computed like <code>store.autoApprovable()</code> pulls the fresh value synchronously — signals need no marbles, no fakeAsync, no async/await. The boundary spec is the load-bearing one: it pins the frontend to the same inclusive <code>&gt;=</code> rule the NestJS backend applies, the contract 1.1 established and 3.8 will re-assert end to end.</p>

<p>The schematic adds three files: <code>src/main.server.ts</code> (the server-side bootstrap mirror of main.ts), <code>src/app/app.config.server.ts</code> (server-only providers merged over your app config), and <code>src/server.ts</code> (an Express-style Node handler that renders each request). It also switches the builder to server output — <code>ng serve</code> now renders through the server engine in dev, so you see SSR behavior immediately, not just in production builds.</p>
<p>Render modes are declared in a server route table that mirrors your 2.2 routes:</p>
<pre><code class="language-ts">// src/app/app.routes.server.ts

export const serverRoutes: ServerRoute[] = [

  { path: 'providers/:npi', renderMode: RenderMode.Server },

];</code></pre>

const serverConfig: ApplicationConfig = {

};

<p>Server-rendered HTML has a trap: the browser paints it instantly, but until Angular boots, nothing is interactive. Worse, without hydration Angular would throw the server DOM away and re-render from scratch — a visible flicker and a wasted paint. <strong>Non-destructive hydration</strong> fixes this: Angular walks the existing server-rendered DOM, claims each node, and attaches listeners without re-creating anything.</p>
<pre><code class="language-ts">// src/app/app.config.ts (client config — hydration is opted into here)
import { provideClientHydration, withEventReplay } from '@angular/platform-browser';

export const appConfig: ApplicationConfig = {
  providers: [
    provideRouter(routes),
    provideClientHydration(withEventReplay())
  ]
};</code></pre>
<p><code>withEventReplay()</code> closes the interactivity gap: if a member taps a provider card's Details button <em>before</em> hydration finishes, the event is captured at the document root, queued, and replayed against the real handler once it exists. No dead clicks on slow connections.</p>
<p>Hydration's one demand is that server and client render <strong>identical DOM</strong>. The classic mismatch sources: direct DOM manipulation outside Angular, invalid HTML nesting the browser silently corrects (a <code>&lt;table&gt;</code> without <code>&lt;tbody&gt;</code>, a <code>&lt;div&gt;</code> inside a <code>&lt;p&gt;</code>), and rendering values that differ between environments (timestamps, random ids). Angular logs a mismatch error naming the component; fix the cause rather than reaching for the <code>ngSkipHydration</code> escape hatch, which silently costs you the benefit for that whole subtree.</p>`
    },
    { heading: "SSR-safe components: there is no window on the server",
      html: `
<p>Your components now execute twice: once in Node, once in the browser. Node has no <code>window</code>, <code>document</code>, <code>localStorage</code>, or <code>IntersectionObserver</code> — touch them during server rendering and the render crashes with a ReferenceError in your terminal, not the browser console. The directory component that restores saved specialty filters from localStorage is exactly this kind of landmine.</p>
<p>Two tools, in order of preference. First, <code>afterNextRender</code>: registered in an injection context, it runs <strong>only in the browser</strong>, after the first render — the natural home for browser-API work.</p>
<pre><code class="language-ts">import { Component, afterNextRender, inject, PLATFORM_ID, signal } from '@angular/core';
import { isPlatformBrowser } from '@angular/common';

@Component({
  selector: 'pa-provider-directory',
  templateUrl: './provider-directory.html'
})
export class ProviderDirectory {
  private readonly platformId = inject(PLATFORM_ID);
  readonly savedSpecialty = signal&lt;string | null&gt;(null);

  constructor() {
    // Never runs on the server; runs after first browser render.
    afterNextRender(() =&gt; {
      this.savedSpecialty.set(localStorage.getItem('pa-directory-specialty'));
    });
  }

  exportList(): void {
    // Second tool: an explicit platform guard for code that is not
    // tied to the render lifecycle.
    if (isPlatformBrowser(this.platformId)) {
      window.print();
    }
  }
}</code></pre>
<p>Note the signal: the server renders with <code>savedSpecialty()</code> as null, the browser fills it in after hydration, and change detection updates the view — no mismatch, because the server DOM and the initial client DOM agree.</p>`

<p>The lifecycle: <code>@placeholder</code> renders immediately (give it a fixed height so the load does not shift layout); when the trigger fires, the chunk is fetched — <code>@loading</code> shows if the fetch takes longer than 100ms and, once shown, stays at least 300ms to avoid a flash; then the real panel swaps in, or <code>@error</code> if the chunk fails. For <code>on viewport</code> and <code>on interaction</code>, the placeholder is mandatory — it is the element Angular watches with IntersectionObserver or wires the interaction listener to.</p>
<p>The three triggers you will actually use:</p>

    { heading: "The deploy freeze that split the portal",
      html: `
<p>The pa-portal you have built across Tracks 1–3 is a good application: signals-based review queue, typed intake forms, SSR'd provider directory, tested end to end. It is also <strong>one</strong> application — one repository, one build, one release train. That was fine when one team owned it. It stops being fine the week the org grows.</p>
<p>Here is the incident that starts Track 4. The review team finds a bug: <code>DENIED</code> requests render with the <code>APPROVED</code> badge styling — a genuinely dangerous display error for a nurse reviewer scanning the queue. The fix is a one-line change to the <code>statusBadge</code> pipe. But the intake team merged a half-finished eligibility-check feature to main the day before, and it fails in staging. The release train is frozen. The review team's one-line clinical-safety fix waits four days for another team's rollback.</p>
<p>Nothing about Angular caused this. The cause is organizational: three teams — intake, review, provider directory — sharing one deployable artifact. Every team's release gates every other team's release. This is Conway's law running in reverse: the org has split, but the architecture still assumes one team, so the architecture loses.</p>
<div class="callout">Micro-frontends are an <strong>organizational</strong> architecture. They trade runtime simplicity for team autonomy: independent repos, independent pipelines, independent deploys, independent rollbacks. If you do not have the team-coupling pain, you are paying the price without collecting the benefit.</div>
<p>The signals that say the pain is real: multiple teams routinely blocked on each other's releases; hotfixes queuing behind unrelated features; merge conflicts concentrated in shared files like the route config; teams wanting different release cadences (the directory team ships weekly, the review team wants same-day clinical fixes). If instead you have one team of five, none of this module's machinery applies — and section 3 gives you the cheaper tools to use instead.</p>`
    },
    { heading: "What a micro-frontend is — and what it is not",
      html: `
<p>A micro-frontend is a <strong>vertical slice of the UI that a team owns end to end</strong> — its own repository, pipeline, and deploy — which the browser composes with other slices <em>at runtime</em>. The composing party is a thin <strong>shell</strong> (in single-spa terms, the root config — ours will be <code>pa-shell</code>): it owns the page skeleton, decides which slice is active for the current URL, and mounts and unmounts slices as the user navigates.</p>
<p>Two things commonly mislabeled as micro-frontends, and why they are not:</p>
<p><strong>A lazy-loaded route is not an MFE.</strong> Your <code>/intake</code> route from 2.2 loads its own chunk, but that chunk was produced by the same build, at the same commit, with the same dependency versions as everything else. One team's broken merge still freezes everyone. Lazy loading is code-splitting; micro-frontends are <em>deploy</em>-splitting.</p>
<p><strong>A shared component library is not an MFE.</strong> Publishing <code>PanelComponent</code> from 3.4 as an npm package is build-time composition: consumers pick a version and get updates only when they rebuild. Useful (and we will use it), but the coupling is still there, just versioned.</p>
<p>Look at the file where the coupling concentrates today — the route config is three teams interleaved in one artifact:</p>
<pre><code class="language-ts">// pa-portal/src/app/app.routes.ts — one file, three teams, one release train
export const routes: Routes = [
  {
    path: 'intake',                       // ← Intake team
    loadChildren: () =&gt; import('./intake/intake.routes')
  },
  {
    path: 'queue',                        // ← Review team
    loadComponent: () =&gt; import('./queue/review-queue')
  },
  {
    path: 'request/:id',                  // ← Review team
    loadComponent: () =&gt; import('./queue/request-detail')
  },
  {
    path: 'providers',                    // ← Directory team (SSR'd in 3.9)
    loadChildren: () =&gt; import('./providers/provider.routes')
  }
];</code></pre>
<p>The micro-frontend move keeps this exact URL structure but changes who serves each prefix: <code>pa-shell</code> maps <code>/intake</code> to whatever the intake team most recently deployed, <code>/queue</code> to the review team's latest, and so on. Each mapping points at an independently built, independently versioned bundle fetched at runtime. That per-URL, whole-workflow split is a <strong>vertical</strong> decomposition. The alternative — several MFEs sharing one page (a search MFE beside a results MFE) — is a horizontal split: rarer, harder, and not where you start. The portal's workflows are naturally page-shaped, so vertical is the default here and in most apps.</p>`

    { heading: "Alternatives first: lazy routes and the enforced monorepo",
      html: `
<p>Runtime composition is the most expensive tool in the drawer, so reach for it last. Two cheaper architectures solve real subsets of the problem:</p>
<p><strong>Lazy routes (you already have this).</strong> Solves initial-payload size and gives soft code boundaries. Solves nothing organizational — one build, one train.</p>
<p><strong>Enforced monorepo.</strong> Tools like Nx let you carve the portal into libraries with machine-enforced dependency rules: <code>libs/intake</code> cannot import from <code>libs/review-queue</code>; both may import from <code>libs/shared-models</code> (the <code>AuthRequest</code>, <code>Member</code>, and <code>Provider</code> types from 1.1). CI runs only the tests affected by a change. Ownership, boundaries, and blame all become explicit — while dependencies stay on <em>one version</em> and refactors stay atomic. This fixes merge-conflict pain and ownership ambiguity. It still ships one artifact: the deploy freeze from section 1 happens anyway.</p>
<table><tr><th>Axis</th><th>Lazy routes</th><th>Enforced monorepo</th><th>Runtime MFEs (single-spa)</th></tr>
<tr><td>Code boundaries</td><td>By convention</td><td>Machine-enforced</td><td>Physical (separate repos/builds)</td></tr>
<tr><td>Independent deploys</td><td>No</td><td>No</td><td><strong>Yes</strong></td></tr>
<tr><td>Independent rollback</td><td>No</td><td>No</td><td><strong>Yes</strong></td></tr>
<tr><td>Dependency versions</td><td>One set</td><td>One set</td><td>Per-MFE (skew possible — 4.4)</td></tr>
<tr><td>Runtime overhead</td><td>None</td><td>None</td><td>Shell + duplicated deps unless shared</td></tr>
<tr><td>Atomic cross-cutting refactors</td><td>Trivial</td><td>Trivial</td><td>Multi-repo coordination</td></tr></table>
<p>Read the table bottom-up and one axis stands alone: every column agrees except <strong>independent deploys and rollbacks</strong>. That is the deciding question, and it is a question about your org, not your code:</p>
<div class="callout"><strong>Do separate teams need to ship and roll back on separate cadences?</strong> If yes — and the four-day freeze on a clinical-safety fix says yes for this portal — runtime composition is what you are buying, and everything else is the bill. If no, adopt the monorepo, take the enforced boundaries for free, and skip Track 4's machinery entirely. Choosing MFEs because they are interesting is how you get three broken deploys instead of one.</div>`

<p>Decide with the full invoice in view. Four costs, each with a Track 4 module that manages (never erases) it:</p>
<p><strong>1. Duplicated framework payload.</strong> Three Angular apps naively bundled means three copies of Angular's runtime shipped to every nurse reviewer's browser. Sharing dependencies across MFEs via import maps — and deciding when sharing is worth the coupling it re-introduces — is module 4.4.</p>
<p><strong>2. Version skew.</strong> Independence means <code>pa-intake</code> can run Angular 20.1 while <code>pa-review-queue</code> runs 20.3 — by design during migrations, by accident otherwise. Every shared contract (the <code>Member</code> event bus in 4.5, shared models) must tolerate consumers deploying at different times. There is no atomic cross-MFE release; there are only compatible neighbors.</p>
<p><strong>3. Consistency drift.</strong> Three teams shipping UI independently will drift — spacing, badge colors, interaction patterns — unless consistency is engineered: shared design tokens, a versioned component library, and the shell owning global chrome. A member's <code>PENDED</code> request must look identically <code>PENDED</code> in the queue and the intake confirmation screen; that is now a contract, not a side effect of one stylesheet.</p>
<p><strong>4. Multiplied operations.</strong> Four pipelines, four monitoring surfaces, four sets of alerts — and cross-MFE failures that no single team's dashboard explains. Track 6 (CI/CD in 6.3, monitoring in 6.4) is where this gets industrialized.</p>
<p>And one constraint to log honestly today: the provider directory earned SSR in 3.9 because members reach it from search engines. Client-side runtime composition and SSR sit awkwardly together — the shell composes in the browser, after the HTML crawlers see. Write that risk down now; it becomes a first-class input when 4.6 weighs single-spa against Module Federation and against keeping the directory standalone.</p>

<p>For the portal, the workflows are already clean, and the split falls out of the route table from section 2. Publish it as a typed manifest — this document is the contract every remaining Track 4 module implements:</p>

<p>Three rules are encoded here. <strong>Every route prefix has exactly one owner</strong> — <code>/request/:id</code> belongs to the review team even though intake's confirmation screen links to it; the link is a plain URL navigation, which is the loosest and best cross-MFE coupling there is (more in 4.5). <strong>The shell owns what no team should</strong>: <code>pa-shell</code> keeps authentication and the token from 2.5's interceptor, top navigation, the route-to-MFE map, and a global error boundary — and deliberately contains as little code as possible, because everyone depends on it and it deploys least often. <strong><code>consumes</code> lists are one-directional</strong>: an MFE may consume shared concerns, but no MFE ever appears in another MFE's list. The moment <code>pa-intake</code> imports from <code>pa-review-queue</code>, you have rebuilt the monolith with extra network requests.</p>`

<p>The rest of Track 4 executes this document. 4.2 builds <code>pa-shell</code> as a single-spa root config whose activity functions are the manifest's <code>routes</code> arrays turned into code. 4.3 converts the review queue — the team that needed the independent hotfix most — into <code>pa-review-queue</code> with single-spa-angular. 4.4 pays down cost #1 with import maps and shared dependencies. 4.5 implements the <code>consumes</code> column: the auth token utility and the selected-member event bus. And 4.6 revisits today's decision with full information, weighing single-spa against Module Federation — with the directory's SSR constraint on the table. Keep the manifest open; you will implement it line by line.</p>`

<p>single-spa's entire job fits in one sentence: <em>for every URL change, compute which registered applications should be active, and drive each one's lifecycle until reality matches.</em> It is not a framework and renders no UI of its own — it is a traffic controller for other applications' lifecycles.</p>
<p>If you are coming from the Angular Router (2.2), shift the mental model one level up: the router swaps <em>components</em> inside one application; single-spa swaps <em>entire applications</em> inside one page. Both react to the same browser history.</p>
<p>The shell's HTML shows how little it owns — chrome, a container, an import map, and one script kick-off:</p>

<p>The import map is a phone book: names like <code>@pa/review-queue</code> resolve to URLs where each team publishes its latest bundle. For now, treat it as given — module 4.4 is entirely about that phone book (and about not shipping Angular three times through it).</p>

<p>The root config's code is three registrations and one <code>start()</code> — and because 4.1 published the manifest as data, the registrations can be derived from it instead of hand-copied:</p>
<pre><code class="language-ts">// pa-shell/src/pa-root-config.ts
import { registerApplication, start } from 'single-spa';
import { PORTAL_MANIFEST } from './mfe-manifest';

for (const mfe of PORTAL_MANIFEST) {
  registerApplication({
    name: '@pa/' + mfe.name.replace('pa-', ''),      // '@pa/review-queue'
    app: () =&gt; System.import('@pa/' + mfe.name.replace('pa-', '')),
    activeWhen: mfe.routes,                          // ['/queue', '/request']
    customProps: { team: mfe.team }
  });
}

start({ urlRerouteOnly: true });</code></pre>
<p>Each field is a promise the shell makes:</p>
<p><strong><code>name</code></strong> — unique identity, used in status queries, error messages, and dev tooling.</p>
<p><strong><code>app</code></strong> — a <em>loading function</em>, not a loaded app. This is the part newcomers misread: <code>registerApplication</code> downloads nothing. The function is invoked the first time this app's activity returns true; only then does SystemJS fetch the bundle, and the returned module must export the lifecycles from section 4. A nurse reviewer who lives in <code>/queue</code> all shift never downloads a byte of intake code — the same economics as 2.2's lazy routes, now at application granularity.</p>
<p><strong><code>activeWhen</code></strong> — the activity rule, next section.</p>
<p><strong><code>customProps</code></strong> — a plain object passed into every lifecycle call. This is the shell's one sanctioned channel for handing MFEs cross-cutting context (in 4.5 it carries the auth-token utility; keep it small and serializable-ish for sanity).</p>
<p><code>start({ urlRerouteOnly: true })</code> flips single-spa from registering to routing — before <code>start()</code>, apps load but never mount. The <code>urlRerouteOnly</code> flag stops single-spa re-evaluating activity on <code>pushState</code> calls that do not change the URL, which avoids pointless churn once real routers (Angular's, in 4.3) live inside the MFEs.</p>`

    { heading: "Activity functions: the manifest's routes become code",

<p>An activity rule answers one question: <em>given this location, should this app be active?</em> The string form <code>'/queue'</code> means "pathname starts with /queue". The array form ORs prefixes together, which is exactly the shape of the manifest's <code>routes</code> column. When prefixes are not enough, pass a function:</p>
<pre><code class="language-ts">// Equivalent to activeWhen: ['/queue', '/request'] — written out

  location.pathname.startsWith('/queue') ||

<p>Two constraints follow from <em>when</em> these run. single-spa calls every registered app's activity function on <strong>every routing event</strong> — every link click, every pushState, every back button, dozens of times a session. So activity functions must be:</p>
<p><strong>Pure.</strong> Read the <code>location</code> argument, return a boolean. No fetching the <code>Member</code>'s session, no permission checks, no DOM reads. An activity function that asks the server whether this reviewer may see the queue turns every navigation into a network round-trip — authorization belongs inside the MFE (or the shell's auth guard), not in the routing hot path.</p>

<p>Note what single-spa does <em>not</em> enforce: nothing stops two apps' activity functions both returning true — that is how horizontal composition (several MFEs on one page) works, and it is legitimate single-spa usage. Our portal's discipline is stricter by choice: 4.1's one-owner rule means the three domain apps' prefixes never overlap, so exactly one is active at any URL. The manifest made that a review-time rule; the lab makes it a runtime assertion.</p>`

<pre><code class="language-ts">// pa-status-banner/src/main.ts — a deliberately framework-free MFE
let el: HTMLElement | null = null;

export async function bootstrap() {
  // Runs ONCE per page load, before the first mount.
  // One-time setup only: config, warming a cache. Usually empty.
}

export async function mount() {
  // Runs on EVERY activation. Build DOM, attach listeners, render.
  const res = await fetch('/api/auth-requests?status=IN_REVIEW');
  const pending: Array&lt;{ id: string }&gt; = await res.json();

<p>single-spa drives each app through a status machine and calls these at the transitions: <code>NOT_LOADED → LOADING_SOURCE_CODE → NOT_BOOTSTRAPPED → BOOTSTRAPPING → NOT_MOUNTED → MOUNTING → MOUNTED</code>, then back to <code>NOT_MOUNTED</code> via <code>UNMOUNTING</code> when the activity turns false. Two statuses matter for debugging: <code>LOAD_ERROR</code> (the bundle failed to fetch — check the import map URL) and <code>SKIP_BECAUSE_BROKEN</code> (a lifecycle threw or rejected; single-spa quarantines the app and will not retry until you act). Query it anytime:</p>

<p>Resolution is lazy and cached: the first module to request <code>rxjs</code> triggers one fetch of that URL; every later request — from any MFE — gets the same, already-instantiated module. That single sentence is the entire sharing mechanism. (The <code>extras/amd.min.js</code> script matters: SystemJS natively loads System.register output, and the AMD extra teaches it to also consume the UMD bundles that libraries like rxjs publish.)</p>
<p>Look again at what the map's entries mean operationally. <code>@pa/review-queue → //localhost:9002/main.js</code> is not configuration trivia — it is <em>the deployment</em>. 4.3 said "deploying the queue means updating one import-map URL"; now you can see why: the map is the only place where the portal's composition is declared, so changing where a name points <em>is</em> releasing a new version of that MFE. Roll-back is pointing it back. The import map is the portal's deployment control plane, and section 5 exploits that deliberately.</p>`

  require('single-spa-angular/lib/webpack').default;

<p>With <code>rxjs</code> external, the queue's <code>main.js</code> shrinks by rxjs's full weight, and its System.register header now lists <code>rxjs</code> as a dependency for SystemJS to resolve — through the map, to one shared copy. Repeat in intake and the directory and the page has one rxjs, whoever loads first.</p>
<p>Three categories share cleanly, and it is worth naming why:</p>
<p><strong>Framework-agnostic libraries that publish a loadable single-file build</strong> — rxjs (UMD), date libraries, single-spa itself. One copy, no framework entanglement.</p>

<div class="callout">The prerequisite hiding in all three: <strong>the dependency must exist as something SystemJS can load at runtime</strong> — System.register or UMD. That innocuous-looking requirement is exactly where the next section's bad news comes from.</div>`

<p>That leaves three real options. Price each:</p>
<p><strong>1. Isolate Angular per MFE and mitigate (the portal's choice).</strong> Keep the duplication; blunt the wire cost with brotli and immutable cache headers (6.2) and hold the line with bundle budgets (5.3). The parse/execute cost per copy remains — that is the honest price of team autonomy. Mitigations matter: ~380 KB of <code>@angular/core</code> is ~90 KB over the wire with brotli, cached across visits.</p>
<p><strong>2. Build your own System bundles of Angular.</strong> Technically possible; operationally a trap. You become the maintainer of a bespoke Angular distribution, and — worse — every MFE must now run <em>the same Angular version</em>, because they share one runtime copy. Re-read that with 4.1 eyes: an Angular major upgrade now requires all three teams to move in lock-step. You have rebuilt the release train, just for upgrades instead of features.</p>
<p><strong>3. Change composition technology.</strong> Module Federation and Native Federation were designed around exactly this problem — sharing versioned dependencies between separately-built apps, with per-dependency version negotiation at runtime. That is a genuine advantage, and pretending otherwise would rig 4.6's comparison. It is also not free (its own config surface, its own failure modes), which is why the decision waits for 4.6's full matrix instead of being made here in a moment of bundle-size grief.</p>

<p>The workflow: open the <em>staging</em> portal, override exactly one entry — <code>@pa/review-queue → //localhost:9002/main.js</code> — and reload. You are now debugging your local queue code against the deployed intake, the deployed directory, and staging's real API data. Approve an <code>IN_REVIEW</code> request with your local build while everything around it is the genuine article. Toggle the override off and you are back on pure staging. This is the single biggest developer-experience win in the whole single-spa toolbox, and it is a direct consequence of making the map the control plane.</p>`

    { heading: "The hierarchy: reach for the loosest coupling that works",
      html: `
<p>Until now the portal's MFEs have communicated through exactly one channel: the URL. That was a feature, not a gap — but three real requirements have been queuing up. The queue's interceptor still manages its own auth token, though the manifest says the token is shell territory. Each MFE hard-codes its API base URL, though 3.6 built the <code>API_BASE_URL</code> token for exactly this. And UX wants context to travel: a reviewer looking at a <code>Member</code> in the queue should be able to start a new intake for that member without re-searching.</p>
<p>The failure mode to avoid is grabbing the most powerful channel for every need. Cross-MFE channels form a hierarchy, and every step down it costs autonomy:</p>
<table><tr><th>Channel</th><th>Coupling</th><th>Right for</th></tr>
<tr><td>URL (path + query params)</td><td>Loosest — a public string</td><td>Where you are, what you are looking at, shareable state</td></tr>
<tr><td>customProps</td><td>Shell → MFE, at mount</td><td>Environment context known at registration: API base URL, team metadata</td></tr>

<p>The discipline: start at the top, move down only when the current row genuinely cannot carry the data. Each of this module's sections is one row — and the last row gets an autopsy instead of an implementation.</p>

<p>Before adding machinery, exhaust the channel you already have. The URL is refresh-safe, deep-linkable, bookmark-able, testable with a paste, and — decisive for Track 4 — it version-skews gracefully: intake deployed Tuesday and the queue deployed Friday agree about <code>/request/PA-2041</code> without any coordination, because a URL's contract is just its shape.</p>
<pre><code class="language-ts">// Cross-MFE 'messages' that are really just navigation:
'/request/PA-2041'                  // queue → detail: which AuthRequest
'/queue?status=IN_REVIEW&amp;overdue=1' // shareable filter state

<p>That last one is worth pausing on, because it already solves a naive version of the selected-member requirement: the queue's "Start intake for this Member" button can simply navigate to <code>/intake?memberId=M-1044</code>, and intake reads the query param with the router APIs from 2.2. If the requirement stopped there, section 5 would not exist.</p>
<p>The URL stops being the answer on three conditions: the data is <strong>secret</strong> (an auth token in a query string lands in browser history, server logs, and screenshots), the data is <strong>too rich</strong> (the full selection context — display name, plan, eligibility snapshot — does not belong in an address bar), or the message has <strong>no navigation attached</strong> (a session-expiry warning should reach the mounted MFE without moving the user anywhere). Those three failures map exactly onto the next three sections.</p>`

<p>The auth token fails the URL test on secrecy, and it fails duplication on drift: three MFEs each reading their own localStorage key with their own refresh logic is three chances for a nurse reviewer to be half-logged-in. The fix is the pattern 4.4 set up and reserved a name for — a <strong>utility module</strong>: a small, framework-free library, built directly to System.register, resolved through the import map, owned by the platform team.</p>
<pre><code class="language-ts">// packages/pa-auth-utils/src/index.ts — no Angular, no DOM, no framework
let token: string | null = null;

export function setToken(next: string | null): void {
  token = next;
}

export function getAuthHeader(): Record&lt;string, string&gt; {
  return token ? { Authorization: 'Bearer ' + token } : {};
}

export function isAuthenticated(): boolean {
  return token !== null;
}</code></pre>
<pre><code class="language-js">// packages/pa-auth-utils/rollup.config.mjs — the whole build

  input: 'src/index.ts',
  output: { file: 'dist/pa-auth-utils.js', format: 'system' },

<p>The shell calls <code>setToken()</code> at login. The queue's functional interceptor from 2.5 sheds its private token logic:</p>
<pre><code class="language-ts">// pa-review-queue — the 2.5 interceptor, slimmed to a consumer
import { HttpInterceptorFn } from '@angular/common/http';
import { getAuthHeader } from '@pa/auth-utils';

export const authInterceptor: HttpInterceptorFn = (req, next) =&gt;
  next(req.clone({ setHeaders: getAuthHeader() }));</code></pre>
<p>Now the load-bearing question: <em>why do the shell and every MFE see the same <code>token</code> variable?</em> Because of two 4.4 decisions working together. The import map resolves <code>@pa/auth-utils</code> to one URL, and SystemJS instantiates a module <strong>once per page</strong> — every importer gets the same instance, so module-level state is page-level state. And the <code>/^@pa\\//</code> externals rule keeps webpack from bundling a <em>private copy</em> into each MFE. Break that second half — forget the external in one MFE — and that MFE silently gets its own <code>token = null</code>, blind to the shell's login. No error, just 401s from one team's app. The lab sabotages this on purpose, because you will meet it in production sooner or later.</p>`

});</code></pre>
<pre><code class="language-ts">// pa-review-queue/src/main.single-spa.ts — props meet DI

    const props = singleSpaProps as { apiBaseUrl: string };
    return bootstrapApplication(ReviewQueueRoot, {

<p>Downstream of that provider, nothing changes: <code>AuthRequestService</code> and every consumer of <code>API_BASE_URL</code> from 3.6 keeps working, unaware its value now arrives from the shell instead of an environment file. That is DI doing its actual job — the seam moved and the consumers did not.</p>
<p>Know the channel's limits. customProps are read at mount; they are not a live stream (an MFE will not observe a mid-session change), and they are not a dumping ground — a props object that grows domain data is the shell becoming a state store, which 4.1 forbade. Environment context in, domain traffic out.</p>`

  bus.next(evt);
}

export const memberSelected$ = bus.asObservable();</code></pre>
<p><code>ReplaySubject(1)</code> is not a stylistic choice — it is mount-timing correctness. The queue publishes the selection <em>while intake is not even mounted</em>; intake mounts seconds later when the reviewer navigates. A plain <code>Subject</code> would have already dropped the event into the void; the replay buffer hands the latest selection to any subscriber, whenever it arrives. (The native-platform alternative — <code>CustomEvent</code> on <code>window</code> — needs no rxjs but has exactly this gap: no replay, so late-mounting consumers miss the message.)</p>
<p>Publishing and consuming stay idiomatic on each side of the seam. The queue calls <code>selectMember()</code> from its detail page; intake converts the stream to a signal with 2.7's interop and prefills:</p>
<pre><code class="language-ts">// pa-intake — consuming the bus, signals-first

import { memberSelected$ } from '@pa/member-context';

export class IntakeForm {
  readonly memberContext = toSignal(memberSelected$);
  // effect(() => prefill from this.memberContext()) — 2.6's tools take over
}</code></pre>
<p>And the anti-pattern autopsy, as promised. <code>window.paSharedState = { member: ... }</code> gives you an untyped, unversioned global that every team mutates and no team owns — race conditions with no paper trail. Importing <code>ReviewQueueStore</code> into intake couples intake's deploy to the store's internal shape, the exact coupling 4.1 spent a module removing. The bus survives version skew because its contract is one frozen-plus-additive interface; a store's shape changes with every refactor. Small payloads, typed contracts, additive evolution — that is the entire discipline.</p>`

<p>Notice what stayed loose. Navigation still happens by URL; <code>/intake?memberId=</code> still works for the simple case; each MFE's stores never left home. Track 4 closes next module with the decision review: 4.6 puts single-spa against Module Federation and Native Federation with everything you now hold — the conversion cost from 4.3, the dependency mathematics from 4.4, the contract discipline from here — and asks which composition technology the portal should actually bet on. You will be equipped to argue either side, which is the point.</p>`

    { heading: "Same problem, different layer",
      html: `
<p>The question this module inherits — "should the portal have used Module Federation instead?" — is asked in every micro-frontend adoption, and it is subtly malformed. The two technologies do not sit at the same layer:</p>
<p><strong>single-spa is an orchestrator.</strong> Its vocabulary is lifecycles and activity: <em>which application should be alive at this URL, and who mounts and unmounts it.</em> It is unopinionated about how code gets loaded — you brought SystemJS and an import map for that.</p>
<p><strong>Module Federation is a module loader.</strong> Its vocabulary is builds and modules: <em>how does one build import code from another build, produced at a different time, and how do they share dependencies without duplication.</em> It is unopinionated about when anything mounts — you bring an orchestrator, and in an all-Angular federation that orchestrator is usually just the Angular Router.</p>
<p>Because the layers differ, they even compose: single-spa's loading functions can call federation's loader instead of <code>System.import</code>. But the practical, whole-stack choice most teams face is between two <em>bundles of defaults</em>: the stack you built in 4.2–4.5 (single-spa + SystemJS + import maps + lifecycle-wrapped apps), or a federation stack (host + remotes + shared dependencies, composed through the host's router). Naming the layers keeps the comparison honest — several rows of section 4's matrix turn out to be properties of a layer, not a product.</p>
<div class="callout">Ask "who decides when the review queue appears, and who decides how its code loads?" of any MFE stack and you have located both layers. In your current portal: single-spa decides when; SystemJS + the import map decide how.</div>`
    },
    { heading: "Module Federation: builds that import from each other",
      html: `
<p>Module Federation (a webpack 5 feature) lets a running application import modules from a <em>different build</em> at runtime. One app is the <strong>host</strong>; the others are <strong>remotes</strong>, each publishing a small <code>remoteEntry.js</code> manifest describing what it <strong>exposes</strong>. With <code>@angular-architects/module-federation</code>, the review queue as a remote looks like:</p>
<pre><code class="language-js">// pa-review-queue/webpack.config.js
const { withModuleFederationPlugin, share } =
  require('@angular-architects/module-federation/webpack');

module.exports = withModuleFederationPlugin({
  name: 'reviewQueue',
  exposes: { './Routes': './src/app/app.routes.ts' },
  shared: share({
    '@angular/core':   { singleton: true, strictVersion: true, requiredVersion: 'auto' },
    '@angular/router': { singleton: true, strictVersion: true, requiredVersion: 'auto' },
    'rxjs':            { singleton: true, strictVersion: true, requiredVersion: 'auto' }
  })
});</code></pre>
<pre><code class="language-ts">// host — composition happens in the ROUTER, not in lifecycles
import { loadRemoteModule } from '@angular-architects/module-federation';

export const routes: Routes = [
  {
    path: 'queue',
    loadChildren: () =&gt;
      loadRemoteModule({
        remoteEntry: 'https://static.pa.example.com/review-queue/remoteEntry.js',
        exposedModule: './Routes'
      }).then(m =&gt; m.routes)
  }
];</code></pre>
<p>Notice what is absent: no <code>bootstrap</code>/<code>mount</code>/<code>unmount</code>, no activity functions, no wildcard shock absorber. The remote's routes graft into the host's route tree, and the Angular Router — the orchestrator you already know from 2.2 — handles activation. One framework, one router, one Angular running the page; the remotes contribute route subtrees, not whole applications.</p>
<p>The <code>shared</code> block is the feature 4.4 wanted and could not have. Each entry is a <em>negotiation</em>, not a hard-coded URL: at runtime, host and remote compare the versions they were built against; compatible semver ranges collapse to one loaded copy, and an incompatible remote falls back to its own copy instead of breaking the page — <code>singleton</code> and <code>strictVersion</code> tune how loud that failure is. Ivy's packaging problem dissolves too, because each build compiles Angular normally and the negotiation happens between the <em>built</em> outputs. The price: everything must be webpack, host and remotes couple through the one-Angular-one-Zone runtime they now genuinely share, and a remote failing to negotiate can take down composition in ways a missing import-map entry never could.</p>`
    },
    { heading: "Native Federation: the federation contract, minus webpack",
      html: `
<p>Module Federation's biggest cost for an Angular 20 team is the one 4.3 already paid on the other stack: it chains you to webpack while the framework's own toolchain has moved to esbuild. <strong>Native Federation</strong> (<code>@angular-architects/native-federation</code>) re-implements the federation <em>contract</em> — remotes, exposes, shared-with-negotiation — on top of the platform instead of a bundler: browser-native ES modules and import maps, with metadata in a <code>remoteEntry.json</code>.</p>
<pre><code class="language-js">// pa-review-queue/federation.config.js
const { withNativeFederation, shareAll } =
  require('@angular-architects/native-federation/config');

module.exports = withNativeFederation({
  name: 'review-queue',
  exposes: { './Routes': './src/app/app.routes.ts' },
  shared: shareAll({
    singleton: true, strictVersion: true, requiredVersion: 'auto'
  })
});</code></pre>
<pre><code class="language-ts">// host main.ts — the manifest maps remote names to remoteEntry.json URLs
import { initFederation } from '@angular-architects/native-federation';

initFederation('/assets/federation.manifest.json')
  .then(() =&gt; import('./bootstrap'))
  .catch(err =&gt; console.error(err));</code></pre>
<p>Three consequences follow from "platform, not bundler." You keep the standard esbuild application builder — the fast builds 4.3 traded away, restored (and the loader is bundler-agnostic by design: an esbuild host can compose remotes regardless of what built them, within the shared-contract rules). The import map is back — but <em>generated and version-negotiated</em> by the federation runtime rather than hand-maintained like 4.4's, and using native browser resolution rather than SystemJS. And the mental model converges with where the web platform itself is heading, which is the best predictor of longevity this space offers.</p>
<p>What Native Federation does <em>not</em> change: it composes route subtrees into one Angular application, same as Module Federation — so it inherits the same one-version-negotiation coupling between host and remotes, and it is an Angular-ecosystem tool. If the directory team decided to rewrite in another framework (or a company acquisition brings a React app into the portal), the federation stacks get awkward exactly where single-spa — which composes <em>applications</em>, not route trees — stays indifferent.</p>`

<p>Now the comparison can be honest — each row tagged with what you measured or logged in this track, not vendor claims:</p>

<p>Read the columns as personalities. <strong>single-spa</strong> maximizes independence — any framework, any version, any team, priced in duplicated payload and lifecycle machinery. <strong>Module Federation</strong> maximizes sharing inside a webpack world. <strong>Native Federation</strong> is Module Federation's contract with the toolchain cost removed — for an all-Angular shop, it dominates its webpack sibling on nearly every row, which collapses the real choice to two options: maximal independence (single-spa) versus efficient cohesion (Native Federation).</p>

<p><strong>Choose Native Federation when</strong> the portal is all-Angular and expects to stay that way, dependency sharing matters (three Angulars was 4.4's measured pain), and you want the standard toolchain. <strong>Choose Module Federation</strong> mainly when you are already deep in webpack or need its mature ecosystem of workarounds.</p>
<p>For the Prior Auth Portal, the honest reading of the matrix says Native Federation fits an all-Angular portal's <em>steady state</em> best. And yet ADR-002 records: <strong>stay on single-spa, with named re-evaluation triggers.</strong> The reasoning is the part worth learning, because it is the part that generalizes:</p>
<p>The migration is not free — it would consume roughly a sprint per team, retire working code (the shell, three conversions, the utility-module wiring), and reintroduce version coupling between teams whose whole Track 4 story was escaping coupling. Against that cost, the benefit today is duplicated-Angular payload — real, measured in 4.4, and already mitigated by brotli, caching, and budgets. A working system's replacement must clear a higher bar than "the alternative is somewhat better," and this one does not clear it. <em>The best technology on the matrix is not automatically the right decision from where you stand.</em></p>
<p>What turns staying into stubbornness is refusing to name the conditions that would change the answer. ADR-002 lists them: <strong>(1)</strong> an Angular major upgrade lands painfully across the custom webpack setup — the 4.3 builder debt coming due; <strong>(2)</strong> payload duplication starts failing Track 5's measured budgets on real reviewer hardware despite mitigations; <strong>(3)</strong> the team roadmap confirms all-Angular-forever, deleting single-spa's framework-independence advantage; <strong>(4)</strong> a fourth MFE is commissioned — greenfield conversion effort that could bootstrap the new stack instead. Any trigger fires, the ADR reopens with this module's matrix as the starting point.</p>`

<p>The failure is silent and data-shaped: the approved <code>AuthRequest</code> keeps its <code>IN_REVIEW</code> badge until something else nudges that card — in a clinical tool, a genuinely dangerous staleness. The lab reproduces it deliberately so you meet it in a lab and not in triage. <em>Re-measure: CD time per keystroke should drop hard; getter evaluations shrink proportionally; cycle count is unchanged — that lever comes later.</em></p>`

<p>Without the zone, Angular schedules work only from its own signals: a <code>signal</code> write, a template event handler, an <code>AsyncPipe</code> emission, a marked-for-check. The queue qualifies on every count — its state is signals (2.6), its store is signal-based (3.2), its streams cross into signals via <code>toSignal</code> (2.7). The code that <em>disqualifies</em> an app is the kind that mutates state from a bare <code>setTimeout</code> or a third-party callback and relies on the zone to notice; 3.3 taught you to find it, and the fix (write to a signal) is the same migration you have been doing all course.</p>

<p>The stakes differ by page and that matters. The <strong>provider directory is public</strong> — members find it through search, and CWV feeds Google's ranking, so its numbers have revenue attached. The queue and intake sit behind login where no crawler scores them — but the thresholds are still the right UX contract, and 5.1's 200ms filter target was INP's threshold wearing a fake mustache the whole time.</p>
<p>Two words in the definition do the most work. <em>Field</em>: a green Lighthouse run on your machine is a lab estimate under one set of conditions — the 4× throttle was always an attempt to simulate the field, and now you measure the field itself. <em>p75</em>: three quarters of real sessions must beat the threshold, so the nurse on the oldest laptop counts three times as hard as your best case. You cannot average away your slowest users.</p>`

<p><strong>Processing</strong> — the handler itself. The approve handler's job description: update the store, fire the request, get out. The anti-pattern is doing everything synchronously before returning — awaiting the API, recomputing derived state, logging. 3.2's store makes the fast path natural:</p>
<pre><code class="language-ts">approve(req: AuthRequest): void {
  // Optimistic: the reviewer sees APPROVED on the next frame
  this.store.updateRequest({ ...req, status: 'APPROVED' });

  this.api.approve(req.id).pipe(
    catchError(err =&gt; {
      this.store.updateRequest(req);          // reconcile: roll back
      this.toasts.error('Approval failed — request restored to IN_REVIEW');
      return EMPTY;
    })
  ).subscribe();
}</code></pre>
<p>The click's visible consequence — badge flips, row leaves the <code>IN_REVIEW</code> filter — costs one signal write; the network happens after the frame. (The rollback path is not optional garnish: optimism without reconciliation is a clinical-data lie. 3.1's error patterns own the retry story.)</p>
<p><strong>Presentation</strong> — producing the next frame. If the click triggers a wide re-render or forced layout, the frame is late even with a fast handler; 5.2's OnPush/signals work and 5.1's forced-reflow hunting carry this phase. Measure interactions in the Performance panel's Interactions track, which shows all three phases per click — the profiler vocabulary from 5.1 applies unchanged.</p>`

<pre><code class="language-ts">// caching.interceptor.ts — TTL cache for GETs that opt in
const CACHE_TTLS: Record&lt;string, number&gt; = {
  '/api/providers': 10 * 60_000,      // network status shifts slowly
  '/api/members':    5 * 60_000,      // plan/eligibility: minutes are safe
  '/api/criteria-defs': 60 * 60_000   // rule definitions: hourly is generous
};
const cache = new Map&lt;string, { body: unknown; expires: number }&gt;();

export const cachingInterceptor: HttpInterceptorFn = (req, next) =&gt; {
  const ttl = req.method === 'GET'
    ? CACHE_TTLS[new URL(req.url, location.origin).pathname] : undefined;

  const hit = cache.get(req.urlWithParams);

  return next(req).pipe(

<p><code>shareReplay</code> multicasts: one upstream execution feeds all subscribers, and the buffer replays the latest emission to late arrivals — the same late-subscriber logic that made <code>ReplaySubject(1)</code> right for 4.5's member bus. The flag that separates a fix from a leak is <code>refCount</code>. With <code>refCount: true</code>, the upstream polling stops when the last subscriber leaves — navigate away from the queue and the timer dies. With <code>refCount: false</code> (the historical default behavior), the timer outlives every subscriber and polls an API for a page nobody is on, forever; in an MFE that mounts and unmounts (4.3), that is a leak with a heartbeat. Rule: <code>refCount: true</code> unless you can argue, in writing, why the stream should outlive its audience.</p>

      html: `
<p>6.1 ended with a byte-identical <code>dist/</code> and a promise: the artifact that passed staging ships to production. A folder of files cannot keep that promise by itself — it needs a web server, that server needs configuration, and 'works on the staging box' quietly depends on whatever nginx version and config drift lives there. A container closes the gap: <strong>artifact + server + server config, versioned as one immutable unit</strong>, running identically on a developer laptop, the staging cluster, and production.</p>
<p>Note what stays <em>outside</em> the image, because 6.1 already decided it: <code>runtime-config.json</code> is environment data, so it is mounted into the container at deploy time, never baked in. One image, many environments — the container is build-once-deploy-many made physical. An image tagged per environment (<code>portal:staging-build</code>) is the 6.1 anti-pattern wearing a whale costume.</p>
<p>The frontend's container has one honest peculiarity: unlike the NestJS backend's image, it contains no runtime application — just static files and nginx. That makes it small, boring, and almost impossible to break, which is exactly what you want from the thing that serves a prior-auth portal to hospital networks.</p>`

      html: `
<p>The naive Dockerfile ships Node, npm, node_modules, and the Angular CLI to production — a gigabyte of build tooling, every byte of it attack surface and none of it needed to serve files. Multi-stage builds split the lifecycle: a build stage that is thrown away, a runtime stage that ships:</p>
<pre><code class="language-bash"># pa-review-queue/Dockerfile
# ---- Stage 1: build (discarded after the COPY below) ----
FROM node:20-alpine AS build
WORKDIR /app
COPY package.json package-lock.json ./
RUN npm ci                      # ci, not install: lockfile is law, builds reproduce
COPY . .
RUN npm run build               # ng build — production configuration, budgets enforced

# ---- Stage 2: runtime (what actually ships) ----
FROM nginx:1.27-alpine
COPY nginx.conf /etc/nginx/conf.d/default.conf

# runtime-config.json is NOT copied — it is mounted per environment (6.1)
EXPOSE 80</code></pre>
<pre><code class="language-bash"># .dockerignore — keep the build context honest
node_modules
dist
.git
docs</code></pre>
<p>The result: the build stage weighs whatever it weighs (nobody cares — it is discarded), and the shipped image is nginx-alpine plus your dist, tens of megabytes. Two details carry the reproducibility: <code>npm ci</code> refuses to resolve versions creatively — the lockfile that built staging builds production — and copying <code>package*.json</code> before the source means Docker's layer cache skips dependency installation when only source changed, keeping CI builds fast (6.3 will lean on this). Run it locally exactly as production will:</p>
<pre><code class="language-bash">docker build -t pa-review-queue .
docker run -p 8080:80 \\
  -v ./config/runtime-config.staging.json:/usr/share/nginx/html/config/runtime-config.json:ro \\

    { heading: "nginx for a SPA: the deep link and the honest 404",
      html: `
<p>Start with the bug every SPA meets on day one of real hosting: a reviewer bookmarks <code>/request/PA-2041</code>, opens it tomorrow, and gets nginx's 404. The file <code>/request/PA-2041</code> does not exist on disk — it is a client-side route (2.2) that only means something once <code>index.html</code> loads Angular. The fix is the SPA fallback:</p>
<pre><code class="language-bash"># nginx.conf — the two-location shape that gets both cases right
server {
  listen 80;
  root /usr/share/nginx/html;

  # Hashed build assets: serve if present, honestly 404 if not.
  location ~* \\.(js|css|woff2|png|svg)$ {
    try_files $uri =404;
  }

  # Everything else is (potentially) a client-side route → index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}</code></pre>
<p>The second block makes deep links work. The first block is the part teams get wrong by omission: <strong>missing assets must 404, not fall back.</strong> Picture the failure without it — a user's stale tab requests <code>main-OLD123.js</code> after a deploy replaced it; the fallback cheerfully serves <code>index.html</code> for that URL; the browser tries to execute an HTML document as JavaScript and dies with a MIME-type error that mentions neither deploys nor caching. You will meet this bug mid-incident; better to have built the config that makes it impossible. An asset request has exactly two honest answers: the asset, or a 404 that tells the truth.</p>`

    { heading: "Compression and the two-tier cache policy",
      html: `
<p>5.3's build table showed 'estimated transfer size' — estimates until the server compresses. And 5.6's client-side caching had a missing tier — the HTTP layer. Both land in the same config file:</p>
<pre><code class="language-bash"># inside the server block
gzip on;
gzip_types text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;
# brotli (~15-20% better): the ngx_brotli module, or precompress in CI
# and serve with brotli_static on;

# Tier 1: hashed filenames — immutable, cache for a year
location ~* \\-[A-Z0-9]{8}\\.(js|css)$ {
  add_header Cache-Control "public, max-age=31536000, immutable";
  try_files $uri =404;
}

# Tier 2: the entry points — never cached
location = /index.html {
  add_header Cache-Control "no-cache";
}
location = /config/runtime-config.json {
  add_header Cache-Control "no-cache";
}</code></pre>
<p>The two tiers are one idea seen from both sides, and the hashing from 6.1's production configuration is what makes it sound. <code>main-XY12AB.js</code> can be cached forever <em>because its name is its content</em> — any rebuild produces a different name, so 'stale' is impossible by construction; <code>immutable</code> even spares the browser its revalidation requests. Meanwhile <code>index.html</code> must never be cached, because it is the thing that <em>names</em> the current hashes — a cached index is a time machine pointing at chunk names that may no longer exist (see the honest 404 above for how that ends). <code>runtime-config.json</code> joins tier 2 for 6.1's reason: an ops change to the config must be the next reload's reality, not next week's.</p>
<p>Verify with the tool you will use in every incident anyway:</p>
<pre><code class="language-bash">curl -sI http://localhost:8080/main-XY12AB.js | grep -iE 'cache-control|content-encoding'
# Cache-Control: public, max-age=31536000, immutable
# Content-Encoding: gzip</code></pre>`

      html: `
<p>Track 4's architecture maps onto containers one-to-one, which is the point — the deploy unit equals the team unit: <code>pa-shell</code>'s image serves the page skeleton, the per-environment import map, and the mounted runtime config; each MFE's image serves its own <code>main.js</code> and chunks from its own host, behind the URL its import-map entry names. 'The review team deploys' means their image rolls; nobody else's container even restarts. (6.3 automates exactly this.)</p>
<p>Cross-origin composition adds the one header teams forget: the shell's page at <code>portal.pa.example.com</code> fetches bundles from <code>static-review.pa.example.com</code>, and SystemJS fetches are subject to CORS. Each MFE's nginx must say who may load it:</p>
<pre><code class="language-bash"># each MFE's nginx.conf — the shell's origin may fetch these bundles

}</code></pre>
<p>The symptom of forgetting is a bundle that loads fine when opened directly but fails from the shell with a CORS error — which, note, single-spa surfaces as 4.2's <code>LOAD_ERROR</code> status. The debugging vocabulary from Track 4 and the infrastructure from Track 6 are one system now. One more seam worth naming: the SPA fallback belongs <em>only</em> to the shell's nginx — MFE images serve bundles, not pages, so their config is tier-1 assets, CORS, and 404s, nothing else.</p>`

<p>For the Track 4 portal the pipeline is also where independence becomes physically real. Each MFE repo carries its own workflow: the review team's pipeline lints, tests, builds, and ships <em>their</em> image on <em>their</em> cadence, and a red build in intake's repo cannot block it — there is simply no shared pipeline to block. The four-day freeze was an organizational failure that Track 4 made architecturally impossible; 6.3 makes the fast path the <em>default</em> path, so the DENIED-badge hotfix ships in the time it takes the gates to run.</p>
