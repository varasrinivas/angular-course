<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angular Mastery · Prior Auth Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fbfaf7; --panel:#ffffff; --ink:#1c2733; --ink-soft:#4a5a6a; --ink-faint:#8a97a5;
  --line:#e4e2da; --line-soft:#efede6;
  --t1:#2563a8; --t2:#0e7d74; --t3:#7c4dbe; --t4:#c05c2e; --t5:#a8322f; --t6:#3d6b35;
  --accent:#2563a8; --ok:#3d6b35; --bad:#a8322f;
  --code-bg:#1c2733; --code-ink:#e8eef4;
  --radius:10px;
  --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65}

/* ── layout ── */
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.sidebar{border-right:1px solid var(--line);background:var(--panel);padding:28px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:48px 64px;max-width:920px}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line)}.main{padding:32px 20px}}

/* ── sidebar ── */
.brand{padding:0 24px 20px;border-bottom:1px solid var(--line-soft);margin-bottom:16px}
.brand h1{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.01em}
.brand .sub{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.track{margin-bottom:6px}
.track-head{display:flex;align-items:center;gap:8px;padding:10px 24px;cursor:pointer;user-select:none}
.track-head:hover{background:var(--line-soft)}
.track-pill{font-family:var(--font-mono);font-size:10px;font-weight:700;color:#fff;padding:2px 7px;border-radius:99px;letter-spacing:.05em}
.track-name{font-size:13.5px;font-weight:600;flex:1}
.track-count{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-faint)}
.track-mods{display:none}
.track.open .track-mods{display:block}
.mod-link{display:flex;gap:10px;align-items:baseline;padding:7px 24px 7px 44px;font-size:13px;color:var(--ink-soft);cursor:pointer;border-left:3px solid transparent}
.mod-link:hover{background:var(--line-soft)}
.mod-link.active{border-left-color:var(--accent);background:var(--line-soft);color:var(--ink);font-weight:500}
.mod-link .mid{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)}
.mod-link.done .mid::after{content:" ✓";color:var(--ok)}

/* ── module view ── */
.eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;display:flex;gap:12px;align-items:center}
.eyebrow .dur{color:var(--ink-faint);font-weight:400;text-transform:none;letter-spacing:0}
h2.mod-title{font-family:var(--font-display);font-size:38px;font-weight:700;letter-spacing:-.02em;margin:10px 0 24px;line-height:1.15}
.objectives{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px;margin-bottom:36px}
.objectives h4{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);margin-bottom:10px}
.objectives li{margin-left:18px;margin-bottom:5px;font-size:14.5px}
.section{margin-bottom:40px}
.section h3{font-family:var(--font-display);font-size:24px;font-weight:600;margin-bottom:14px;letter-spacing:-.01em}
.section p{margin-bottom:14px;color:var(--ink-soft)}
.section p strong{color:var(--ink)}
.section ul,.section ol{margin:0 0 14px 22px;color:var(--ink-soft)}
.section li{margin-bottom:6px}
.section table{border-collapse:collapse;width:100%;margin-bottom:16px;font-size:14px}
.section th,.section td{border:1px solid var(--line);padding:8px 12px;text-align:left}
.section th{font-family:var(--font-mono);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;background:var(--line-soft)}
pre{background:var(--code-bg);color:var(--code-ink);border-radius:var(--radius);padding:18px 20px;overflow-x:auto;margin-bottom:16px;font-size:13.5px;line-height:1.6}
code{font-family:var(--font-mono)}
p code,li code,td code{background:var(--line-soft);padding:1.5px 6px;border-radius:5px;font-size:13px;color:var(--ink)}
.callout{border-left:3px solid var(--accent);background:var(--panel);border-radius:0 var(--radius) var(--radius) 0;padding:14px 18px;margin-bottom:16px;font-size:14.5px;color:var(--ink-soft)}

/* ── lab ── */
.lab{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);margin:44px 0;overflow:hidden}
.lab-head{padding:18px 24px;border-bottom:1px solid var(--line)}
.lab-head .eyebrow{color:var(--ink)}
.lab-scenario{padding:16px 24px;font-size:14.5px;color:var(--ink-soft);border-bottom:1px solid var(--line-soft);font-style:italic}
.lab-tabs{display:flex;border-bottom:1px solid var(--line)}
.lab-tab{flex:1;padding:12px;text-align:center;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.05em;cursor:pointer;color:var(--ink-faint);border-bottom:2px solid transparent}
.lab-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.lab-body{padding:22px 24px}
.lab-body ol{margin-left:20px}
.lab-body li{margin-bottom:10px;font-size:14.5px;color:var(--ink-soft)}
.lab-body .prompt{background:var(--code-bg);color:var(--code-ink);font-family:var(--font-mono);font-size:13px;padding:12px 16px;border-radius:8px;margin-bottom:10px;white-space:pre-wrap}
.lab-body h5{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);margin:18px 0 10px}

/* ── quiz ── */
.quiz{margin:44px 0 60px}
.quiz>h3{font-family:var(--font-display);font-size:24px;margin-bottom:18px}
.qcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.qcard .q{font-weight:600;margin-bottom:12px;font-size:15px}
.opt{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:8px;border:1px solid var(--line);border-radius:8px;background:var(--paper);cursor:pointer;font-family:var(--font-body);font-size:14px;color:var(--ink-soft)}
.opt:hover{border-color:var(--accent)}
.opt.correct{border-color:var(--ok);background:#f0f5ee;color:var(--ink)}
.opt.wrong{border-color:var(--bad);background:#faf0ef}
.explain{display:none;font-size:13.5px;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:10px;margin-top:6px}
.explain.show{display:block}
.mod-nav{display:flex;justify-content:space-between;gap:12px;margin:40px 0 20px}
.mod-nav button{font-family:var(--font-mono);font-size:12.5px;font-weight:700;padding:10px 18px;border:1px solid var(--line);border-radius:8px;background:var(--panel);cursor:pointer;color:var(--ink)}
.mod-nav button:hover{border-color:var(--accent);color:var(--accent)}
.mod-nav button:disabled{opacity:.35;cursor:default}
.home h2{font-family:var(--font-display);font-size:44px;letter-spacing:-.02em;margin-bottom:12px}
.home p{color:var(--ink-soft);max-width:60ch;margin-bottom:10px}
.status-strip{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0}
.status-chip{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;border:1px solid var(--line);color:var(--ink-soft)}
</style>

<script>
/* ════════════════════════════════════════════════════════════════

/* ════════════════════════════════════════════════════════════════
   MODS — module content. Append in id order.
   Each module delimited by a MOD marker comment (validator depends on it).
   ════════════════════════════════════════════════════════════════ */
const MODS = [

/* ── MOD 1.1 ── */
{
  id: "1.1",
  track: 1,
  title: "TypeScript for Angular Developers",
  duration: "45 min",
  objectives: [
    "Model a real domain with interfaces, type aliases, and enums",
    "Use discriminated unions to make invalid states unrepresentable",
    "Apply utility types (Partial, Pick, Readonly) to derive types instead of duplicating them",
    "Read Angular API signatures fluently (generics, function types)"
  ],
  sections: [
    { heading: "TypeScript is the contract, not a formality",
      html: `
<p>Angular is written in TypeScript and, more importantly, <strong>designed around it</strong>: forms are typed, signals are typed, HttpClient responses are typed. In a system like a prior authorization portal — where an incorrectly-shaped request can delay a patient's care — the type system is your first reviewer.</p>
<p>Throughout this course we build the frontend for the Prior Auth Portal whose backend you may know from the NestJS course. The vocabulary is fixed: <code>AuthRequest</code>, <code>Member</code>, <code>Provider</code>, <code>ClinicalCriteria</code>. We start by teaching the compiler that vocabulary.</p>
<div class="callout">Rule for this course: if a value can be wrong at runtime, we try to make it unrepresentable at compile time first.</div>`
    },
    { heading: "Modeling the domain: interfaces and type aliases",
      html: `
<p>An <code>interface</code> describes the shape of an object. A <code>type</code> alias can do that too, plus unions and intersections. Convention we use: <strong>interfaces for entities, type aliases for unions and derived shapes</strong>.</p>
<pre><code class="language-ts">export interface Member {
  memberId: string;
  firstName: string;
  lastName: string;
  plan: 'HMO' | 'PPO' | 'EPO';
  eligibleThrough: string; // ISO date
}

export interface Provider {
  npi: string;             // 10-digit National Provider Identifier
  name: string;
  specialty: string;
  inNetwork: boolean;
}

export type AuthStatus =
  | 'DRAFT' | 'SUBMITTED' | 'IN_REVIEW'
  | 'APPROVED' | 'DENIED' | 'PENDED';

export interface AuthRequest {
  id: string;
  member: Member;
  provider: Provider;
  procedureCode: string;   // CPT code
  urgency: 'STANDARD' | 'EXPEDITED';
  status: AuthStatus;
  confidenceScore: number; // 0..1, from ClinicalCriteria evaluation
  submittedAt?: string;    // absent while DRAFT
}

export const AUTO_APPROVE_THRESHOLD = 0.85;</code></pre>
<p>Notice <code>submittedAt?</code> — optional, because a draft has no submission time. That's already a small lie we'll fix in the next section: the type says "maybe present" when the truth is "present exactly when status is not DRAFT".</p>`
    },
    { heading: "Discriminated unions: making invalid states unrepresentable",
      html: `
<p>A <strong>discriminated union</strong> is a union of object types that share one literal field (the discriminant). The compiler narrows the type when you check that field — so each status can carry exactly the data that exists in that state.</p>
<pre><code class="language-ts">interface DraftAuth {
  status: 'DRAFT';
  id: string;
  procedureCode?: string;      // may be incomplete
}

interface SubmittedAuth {
  status: 'SUBMITTED' | 'IN_REVIEW';
  id: string;
  procedureCode: string;       // now required
  submittedAt: string;         // now required
  confidenceScore: number;
}

interface DecidedAuth {
  status: 'APPROVED' | 'DENIED';
  id: string;
  procedureCode: string;
  submittedAt: string;
  confidenceScore: number;
  decidedAt: string;
  decidedBy: 'AUTO' | 'REVIEWER';
}

export type AuthRequestState = DraftAuth | SubmittedAuth | DecidedAuth;

function decisionLabel(req: AuthRequestState): string {
  switch (req.status) {
    case 'APPROVED':
    case 'DENIED':
      // narrowed to DecidedAuth — decidedBy is safely available
      return req.decidedBy === 'AUTO' ? 'Auto-decided' : 'Reviewer decision';
    case 'DRAFT':
      return 'Not yet submitted';
    default:
      return 'Awaiting decision';
  }
}</code></pre>
<p>Try accessing <code>req.decidedBy</code> in the <code>DRAFT</code> branch — the compiler refuses. That refusal is the feature.</p>`
    },
    { heading: "Deriving types: Partial, Pick, Readonly, and friends",
      html: `
<p>Never hand-write a second version of a type. Derive it:</p>
<pre><code class="language-ts">// The intake form edits a draft — every field optional while typing:
type AuthRequestDraft = Partial&lt;AuthRequest&gt;;

// The review queue row shows a subset:
type QueueRow = Pick&lt;AuthRequest, 'id' | 'urgency' | 'status' | 'confidenceScore'&gt;
              & { memberName: string };

// Data handed to a pure display component should never be mutated:
type QueueRowView = Readonly&lt;QueueRow&gt;;

// A lookup of requests by id:
type AuthIndex = Record&lt;string, AuthRequest&gt;;

function isAutoApprovable(row: QueueRow): boolean {
  return row.status === 'IN_REVIEW'
      && row.confidenceScore &gt;= AUTO_APPROVE_THRESHOLD;
}</code></pre>
<p>When <code>AuthRequest</code> gains a field next sprint, every derived type updates itself. Duplication would have silently drifted.</p>`
    },
    { heading: "Reading Angular signatures: generics in the wild",
      html: `
<p>Every Angular API you'll meet in Track 2 is generic. You can now read these signatures:</p>
<pre><code class="language-ts">// HttpClient — T is the response shape you declare:
http.get&lt;AuthRequest[]&gt;('/api/auth-requests');

// Signals — the value type flows through:
const queue = signal&lt;QueueRow[]&gt;([]);
const pendedCount = computed(() =&gt;
  queue().filter(r =&gt; r.status === 'PENDED').length
);

// Typed forms (Track 2.3) — the control's value type is explicit:
const procedureCode = new FormControl&lt;string&gt;('', { nonNullable: true });</code></pre>
<p>Generics are not academic here: <code>get&lt;AuthRequest[]&gt;</code> is the difference between the compiler catching a typo in <code>confidenceScore</code> and a reviewer catching it in production.</p>`
    },
    { heading: "In the Prior Auth Portal",
      html: `
<p>The types you wrote in this module become <code>src/app/domain/models.ts</code> — the single file every later module imports. The discriminated union powers the status <code>@switch</code> in module 1.4; <code>QueueRow</code> feeds the review queue in 2.6; <code>AUTO_APPROVE_THRESHOLD</code> reappears in the SignalStore decision logic (3.2) and as an e2e assertion (3.8).</p>
<p>One file of types, four tracks of payoff. That's the leverage we're building.</p>`
    }
  ],
  lab: {
    scenario: "You're the first frontend engineer on the Prior Auth Portal team. The NestJS backend team has shipped their API, and your job today is to encode its domain contract in TypeScript so every component built after you inherits it.",
    understandIt: {
      steps: [
        "Create a new folder pa-portal-types and run: npm init -y && npm i -D typescript && npx tsc --init",
        "Create src/models.ts and copy the Member, Provider, AuthStatus, and AuthRequest declarations from section 2 — you should get zero compile errors with npx tsc --noEmit",
        "Add AUTO_APPROVE_THRESHOLD = 0.85 as an exported const and hover it in your editor — note the inferred literal type",
        "Convert AuthRequest into the discriminated union AuthRequestState from section 3; write decisionLabel and confirm it compiles",
        "In decisionLabel's DRAFT branch, try to return req.decidedBy — read the compiler error carefully, then remove the line. The error message is the lesson",
        "Derive QueueRow with Pick and write isAutoApprovable; test it mentally: a PENDED request with score 0.91 should return false (status gate), an IN_REVIEW request with 0.85 exactly should return true (>= threshold)",
        "Run npx tsc --noEmit one final time — a clean pass is your definition of done"
      ]
    },
    buildItWithAI: {
      prompts: [
        "In pa-portal-types/src/models.ts I have AuthRequest with statuses DRAFT|SUBMITTED|IN_REVIEW|APPROVED|DENIED|PENDED. Refactor it into a discriminated union AuthRequestState where: DRAFT has optional procedureCode and no submittedAt; SUBMITTED and IN_REVIEW require procedureCode, submittedAt, confidenceScore; APPROVED and DENIED additionally require decidedAt and decidedBy ('AUTO'|'REVIEWER'). Keep AUTO_APPROVE_THRESHOLD = 0.85 exported.",
        "Write a type-level test file src/models.spec-types.ts using @ts-expect-error comments that proves: (1) decidedBy is not accessible on a DRAFT, (2) submittedAt is required on SUBMITTED, (3) a status string outside the six allowed values fails to compile.",
        "Add a pure function summarizeQueue(rows: QueueRow[]) that returns counts per status and a count of auto-approvable rows (IN_REVIEW and confidenceScore >= AUTO_APPROVE_THRESHOLD). No classes, no Angular imports."
      ],
      acceptance: [
        "npx tsc --noEmit passes with zero errors",
        "Deleting any @ts-expect-error comment in models.spec-types.ts causes a compile failure — proving the constraint is real",
        "summarizeQueue([{...IN_REVIEW row, confidenceScore: 0.85}]) counts it as auto-approvable (boundary is inclusive)",
        "No use of the 'any' type anywhere in src/ (grep -rn ': any' src returns nothing)",
        "Member, Provider, AuthRequestState, QueueRow, and AUTO_APPROVE_THRESHOLD are all exported from a single models.ts"
      ]
    }
  },
  quiz: [
    { q: "The portal's AuthRequest has submittedAt?: string. What's the strongest argument for replacing this with a discriminated union?",
      options: [
        "Optional fields are slower at runtime than required fields",
        "The compiler can then guarantee submittedAt exists exactly when the status implies it, instead of forcing runtime checks everywhere",
        "Discriminated unions serialize to smaller JSON payloads",
        "Angular templates cannot bind to optional properties"
      ],
      answer: 1,
      explain: "Optionality says 'maybe'; the union says 'present exactly in these states'. TypeScript is structural and erased at runtime — there's no performance or payload difference. The win is that every consumer of a SUBMITTED request gets submittedAt without a null check, and every consumer of a DRAFT physically cannot ask for it." },
    { q: "isAutoApprovable checks confidenceScore >= AUTO_APPROVE_THRESHOLD with the threshold at 0.85. A request scores exactly 0.85. What happens, and why does the operator choice matter in this domain?",
      options: [
        "It is auto-approvable; >= is inclusive — and in a clinical workflow the boundary behavior must match the backend's rule exactly",
        "It is not auto-approvable; floating point makes 0.85 unrepresentable",
        "It throws, because number comparison with a const requires Number.epsilon",
        "Behavior is undefined until the value is cast to a float"
      ],
      answer: 0,
      explain: "0.85 >= 0.85 is true. The deeper point: the frontend's boundary rule must mirror the NestJS backend's rule (also >=), or a request could display as 'auto-approvable' while the API pends it — a trust-destroying inconsistency in a healthcare tool. Boundary semantics are a contract, not a detail." },
    { q: "The review queue needs a row type with id, urgency, status, confidenceScore from AuthRequest, plus a computed memberName. Which derivation avoids drift when AuthRequest changes?",
      options: [
        "Copy the four fields into a new interface QueueRow by hand",
        "type QueueRow = Pick<AuthRequest, 'id'|'urgency'|'status'|'confidenceScore'> & { memberName: string }",
        "type QueueRow = Partial<AuthRequest> & { memberName: string }",
        "Use 'any' for queue rows since they're display-only"
      ],
      answer: 1,
      explain: "Pick keeps the four fields tied to their source — rename confidenceScore on AuthRequest and QueueRow breaks loudly at compile time. Partial makes every field optional (the queue would be full of undefined checks), and hand-copying reintroduces silent drift. 'any' throws away the whole contract." },
    { q: "Inside decisionLabel's switch, why can the 'APPROVED'/'DENIED' branch access req.decidedBy without a cast?",
      options: [
        "switch statements disable type checking inside case blocks",
        "decidedBy is declared optional on every member of the union",
        "TypeScript narrows the union by the literal status discriminant, so req is known to be DecidedAuth in that branch",
        "The Angular compiler injects runtime type guards into switch statements"
      ],
      answer: 2,
      explain: "This is discriminant narrowing: checking the shared literal field (status) tells the compiler which union member you're holding, so that branch sees the full DecidedAuth shape. It's pure compile-time reasoning — no runtime guard, no cast, and it's the same mechanism the @switch template syntax will lean on in module 1.4." }
  ]
},

/* ── MOD 1.2 ── */
{
  id: "1.2",
  track: 1,
  title: "Angular Architecture & the CLI",
  duration: "45 min",
  objectives: [
    "Scaffold the pa-portal workspace with ng new and explain every file it generates",
    "Trace the bootstrap path from index.html through main.ts to bootstrapApplication",
    "Configure app-wide behavior with provider functions in app.config.ts",
    "Run ng serve and ng build and read the esbuild output in dist",
    "Place the 1.1 domain models where every later module expects them (src/app/domain/models.ts)"
  ],
  sections: [
    { heading: "The CLI is an architecture decision you don't have to make",
      html: `
<p>Every hand-rolled frontend build starts fast and rots slowly: a webpack config nobody owns, a test runner wired differently on each machine, an upgrade that takes a sprint. For a portal that nurse reviewers depend on daily, build drift is operational risk. The Angular CLI removes the whole category — one tool scaffolds, serves, builds, tests, and updates the app, and every Angular team in the world shares the same layout.</p>
<p>Today we scaffold the workspace the rest of this course lives in:</p>
<pre><code class="language-bash">npm install -g @angular/cli
ng new pa-portal --style=css
cd pa-portal</code></pre>
<p>In Angular 20 the output is <strong>standalone by default</strong>: components declare their own dependencies, and there is not a single module file in the tree. (NgModule still exists as legacy context — module 1.7 teaches you to read old codebases, not to write new ones that way.) The generated skeleton:</p>
<pre><code class="language-bash">pa-portal/
├── angular.json          # workspace + build configuration
├── package.json          # @angular/* deps, npm scripts
├── tsconfig.json         # strict TypeScript, the 1.1 rules enforced
├── public/               # static assets copied verbatim (favicon.ico)
└── src/
    ├── index.html        # the single page; contains &lt;app-root&gt;
    ├── main.ts           # entry point — 5 lines, tour below
    ├── styles.css        # global styles
    └── app/
        ├── app.ts        # root component class: App
        ├── app.html      # root template
        ├── app.css       # root styles
        ├── app.spec.ts   # its unit test
        ├── app.config.ts # app-wide providers (section 3)
        └── app.routes.ts # route table, empty for now (module 2.2)</code></pre>
<p>Twelve files, and you already know what each one is for. That legibility is the product.</p>`
    },
    { heading: "main.ts: the entire bootstrap is one expression",
      html: `
<p>Older frameworks hide startup behind magic; you can't debug what you can't see. Angular 20 puts the whole boot sequence in one readable file. When the browser loads <code>index.html</code>, the build's script tag runs <code>main.ts</code>:</p>
<pre><code class="language-ts">// src/main.ts
import { bootstrapApplication } from '@angular/platform-browser';
import { appConfig } from './app/app.config';
import { App } from './app/app';

bootstrapApplication(App, appConfig)
  .catch((err) =&gt; console.error(err));</code></pre>
<p>Read it as a sentence: <em>mount the <code>App</code> component onto the <code>&lt;app-root&gt;</code> element in index.html, configured by <code>appConfig</code></em>. Two inputs, one function. The promise rejects if bootstrap fails — misconfigured providers surface here, loudly, at startup rather than as a blank page.</p>
<p>Note the generic-free simplicity compared to what you read in 1.1: <code>bootstrapApplication</code> takes a component class and a config object. Everything app-wide — routing, HTTP, change detection strategy — flows in through that second argument.</p>`

<p>An app needs cross-cutting services: a router, an HTTP client, error listeners, a change-detection strategy. Angular 20 configures all of them the same way — <strong>provider functions</strong> in one typed array:</p>
<pre><code class="language-ts">// src/app/app.config.ts
import { ApplicationConfig, provideBrowserGlobalErrorListeners,
         provideZonelessChangeDetection } from '@angular/core';
import { provideRouter } from '@angular/router';
import { routes } from './app.routes';

export const appConfig: ApplicationConfig = {
  providers: [
    provideBrowserGlobalErrorListeners(),
    provideZonelessChangeDetection(),
    provideRouter(routes)

<p>Each <code>provide*</code> call is a plain function that returns exactly the providers a feature needs — nothing more. Because they're functions, the bundler can tree-shake what you don't call, and TypeScript checks their arguments the same way it checked <code>AuthRequest</code> in 1.1. We choose <code>provideZonelessChangeDetection()</code> from day one; module 3.3 explains what zones were and why signals make them unnecessary.</p>

    { heading: "A component owns one piece of the screen",
      html: `
<p>The Prior Auth Portal shows an <code>AuthRequest</code> in at least three places: the review queue, the detail panel, and the intake confirmation screen. Without a shared unit of UI, three teams write three diverging cards and a status renamed in one place silently rots in the other two. Angular's answer is the <strong>component</strong>: a class that owns a template, its styles, and a patch of the DOM.</p>
<p>Anatomy: the <code>@Component</code> decorator attaches metadata to a plain class. In Angular 20, components are <strong>standalone by default</strong> — no registration ceremony (module 1.7 covers where NgModules went).</p>
<pre><code class="language-ts">import { Component } from '@angular/core';
import { AuthRequest } from '../domain/models'; // the file you wrote in 1.1

@Component({
  selector: 'pa-auth-request-card',
  template: \`
    &lt;article class="card"&gt;
      &lt;h3&gt;{{ demo.procedureCode }} · {{ demo.urgency }}&lt;/h3&gt;
      &lt;p&gt;{{ demo.member.lastName }}, {{ demo.member.firstName }} — {{ demo.member.plan }}&lt;/p&gt;
      &lt;span class="status"&gt;{{ demo.status }}&lt;/span&gt;
    &lt;/article&gt;
  \`
})
export class AuthRequestCardComponent {
  protected readonly demo: AuthRequest = {
    id: 'PA-1042',
    member: { memberId: 'M-88213', firstName: 'Alice', lastName: 'Nguyen', plan: 'PPO', eligibleThrough: '2026-12-31' },
    provider: { npi: '1234567890', name: 'Dr. Rivera', specialty: 'Orthopedics', inNetwork: true },
    procedureCode: '73721',
    urgency: 'STANDARD',
    status: 'IN_REVIEW',
    confidenceScore: 0.91
  };
}</code></pre>
<p>Three parts to hold onto: the <code>selector</code> is the tag name other templates use to instantiate this component; the <code>template</code> is what it renders; the class is where its data and logic live. The hard-coded <code>demo</code> field is scaffolding — we replace it with a signal input two sections from now.</p>`

    { heading: "template vs templateUrl, styles and encapsulation",

<p>Inline templates keep tiny components in one file; anything that grows past a screenful belongs in its own file. The CLI's <code>ng generate component</code> defaults to separate files:</p>
<pre><code class="language-ts">@Component({
  selector: 'pa-auth-request-card',
  templateUrl: './auth-request-card.component.html',

<p>Styles — inline via <code>styles</code> or external via <code>styleUrl</code> — are <strong>scoped to the component</strong> by Angular's emulated view encapsulation: a <code>.card</code> rule here cannot leak into the intake form, and the intake form's CSS cannot restyle this card. That scoping is what makes a card safe to drop into the queue, the detail panel, and the confirmation screen without a cascade audit.</p>
<p>Working rule: inline template under roughly fifteen lines, external file beyond that. Never both.</p>`

    { heading: "Signal inputs: data flows in through input()",
      html: `
<p>A card that renders its own hard-coded request is a demo, not a component. The parent — whoever is composing the screen — must hand the <code>AuthRequest</code> in. In Angular 20 that door is a <strong>signal input</strong>:</p>
<pre><code class="language-ts">import { Component, input } from '@angular/core';
import { AuthRequest } from '../domain/models';

@Component({
  selector: 'pa-auth-request-card',
  template: \`
    &lt;article class="card"&gt;
      &lt;h3&gt;{{ request().procedureCode }} · {{ request().urgency }}&lt;/h3&gt;
      &lt;p&gt;{{ request().member.lastName }}, {{ request().member.firstName }}&lt;/p&gt;
      &lt;span class="status"&gt;{{ request().status }}&lt;/span&gt;
    &lt;/article&gt;
  \`
})
export class AuthRequestCardComponent {
  readonly request = input.required&lt;AuthRequest&gt;();
}</code></pre>
<p><code>input.required&lt;AuthRequest&gt;()</code> returns an <code>InputSignal&lt;AuthRequest&gt;</code>. Two consequences:</p>
<p><strong>You read it by calling it</strong> — <code>request()</code>, not <code>request</code>. Reading a signal inside a template registers that template as a dependent, which is the foundation for the fine-grained change detection story in 3.3.</p>
<p><strong>required is enforced at compile time.</strong> A parent that renders the card without binding a request fails template type-checking — the same make-invalid-states-unrepresentable philosophy as the discriminated union from 1.1, applied to component wiring. Use plain <code>input&lt;AuthRequest&gt;()</code> only when absence is genuinely meaningful, and then handle <code>undefined</code>.</p>
<div class="callout">This course uses signal inputs exclusively. The legacy @Input decorator still compiles and you will meet it in older codebases, but new Angular 20 code has no reason to reach for it.</div>`

      html: `
<p>Interpolation <code>{{ }}</code> evaluates a <strong>template expression</strong> against the component instance and renders the result as text. Expressions can read properties, call methods, do arithmetic and comparisons, and use ternaries. They cannot assign, use <code>new</code>, or chain statements — rendering must never mutate state, so the compiler rejects side effects outright.</p>
<p>That discipline pays off in the card. A nurse reviewer scans confidence at a glance, and the auto-approve boundary must read exactly like the backend rule:</p>
<pre><code class="language-ts">import { AuthRequest, AUTO_APPROVE_THRESHOLD } from '../domain/models';

export class AuthRequestCardComponent {

<p>Every screen in the Prior Auth Portal is some combination of three questions: <em>is there anything to show?</em> (a selected <code>AuthRequest</code> or not), <em>how do I show each one?</em> (the review queue list), and <em>which variant applies?</em> (six statuses, six badges). For years Angular answered these with structural directives — a microsyntax bolted onto attributes, imported from <code>CommonModule</code>, diffed at runtime.</p>
<p>Angular's block syntax (<code>@if</code>, <code>@for</code>, <code>@switch</code>) is <strong>built into the template compiler</strong>. Nothing to import, real type narrowing inside each branch, and a list-diffing contract (<code>track</code>) that the compiler refuses to let you forget. In this module we build the review queue — the screen nurse reviewers live in — using nothing but the component patterns from 1.3 and the types from 1.1.</p>`

<p>The field driving this is plain component state, exactly as in 1.3: <code>selected: QueueRow | null = null;</code>. The <code>as req</code> alias is the template twin of the narrowing you saw in 1.1's <code>decisionLabel</code>: inside the block, <code>req</code> is a <code>QueueRow</code>, never <code>null</code> — the template type checker enforces it. Chains work too: <code>@else if (loadFailed) { … }</code>.</p>`

<pre><code class="language-ts">import { Component } from '@angular/core';
import { QueueRow } from '../domain/models';

@Component({

<pre><code class="language-html">@for (row of queue; track row.id) {

  &lt;/article&gt;
} @empty {
  &lt;p class="all-clear"&gt;Queue clear — no requests awaiting review.&lt;/p&gt;
}</code></pre>
<p>Why does the compiler demand <code>track</code>? Because Angular diffs lists by <strong>identity</strong>. When a nurse approves PA-1043 and it leaves the array, <code>track row.id</code> tells Angular "remove exactly one DOM node." Track by position (<code>$index</code>) instead, and every row after the removed one gets <em>reused with shifted data</em> — wrong row animations, focus jumping to a different patient's request. In a clinical worklist that is not a cosmetic bug. Making tracking mandatory turns a classic silent performance-and-correctness leak into an explicit decision.</p>
<div class="callout">Track keys must be unique. In dev mode, two rows sharing an id trigger error NG0955 — Angular telling you your identity contract is broken before your users do.</div>
<p><code>@empty</code> renders exactly when the iterable has zero items — the all-clear state costs one block instead of a separate conditional. Inside <code>@for</code> you also get contextual variables: <code>$index</code>, <code>$count</code>, <code>$first</code>, <code>$last</code>, <code>$even</code>, <code>$odd</code>.</p>`

<p>Each row needs a status badge, and <code>AuthStatus</code> from 1.1 has six values. A ladder of <code>@if</code>/<code>@else if</code> would work, but it hides the real shape of the logic: one discriminant, N variants. That shape is what <code>@switch</code> is for:</p>
<pre><code class="language-html">@switch (row.status) {
  @case ('APPROVED')  { &lt;span class="badge ok"&gt;Approved&lt;/span&gt; }
  @case ('DENIED')    { &lt;span class="badge stop"&gt;Denied&lt;/span&gt; }
  @case ('PENDED')    { &lt;span class="badge wait"&gt;Pended — info needed&lt;/span&gt; }
  @case ('IN_REVIEW') { &lt;span class="badge active"&gt;In review&lt;/span&gt; }
  @default            { &lt;span class="badge"&gt;{{ row.status }}&lt;/span&gt; }
}</code></pre>
<p>Semantics differ from JavaScript's <code>switch</code> in your favor: comparison is strict (<code>===</code>), exactly one branch renders, there is no fallthrough and no <code>break</code>, and <code>@default</code> is optional. This is the template-side payoff of the discriminated union from 1.1: the checker knows <code>row.status</code> is the <code>AuthStatus</code> union, so <code>@case ('APROVED')</code> — a typo — fails the build because that string is not assignable to the union. And if you switch over the full <code>AuthRequestState</code> union's discriminant, each <code>@case</code> narrows the row just like the <code>switch</code> in <code>decisionLabel</code> did.</p>`

<tr><td><code>*ngFor="let row of queue; trackBy: trackById"</code> with a <code>trackById</code> method on the class</td><td><code>@for (row of queue; track row.id)</code></td><td>Tracking is a mandatory inline expression, not an optional method; <code>@empty</code> has no legacy equivalent at all</td></tr>
<tr><td><code>[ngSwitch]="row.status"</code> with <code>*ngSwitchCase="'APPROVED'"</code> children</td><td><code>@switch (row.status) { @case ('APPROVED') { … } }</code></td><td>No host element required; case values are type-checked against <code>AuthStatus</code></td></tr>
</table>
<p>Migrating an old codebase is mechanical: <code>ng generate @angular/core:control-flow</code> rewrites templates automatically. Everything you build in this course uses blocks only.</p>`

{
  id: "1.5",
  track: 1,
  title: "Data Binding & Events",
  duration: "50 min",
  objectives: [
    "Bind component state into the DOM with property, attribute, class, and style bindings",
    "Handle user events with ( ) syntax and use $event without losing type safety",
    "Emit approve and deny intents from AuthRequestCardComponent using the signal output() API",
    "Desugar a two-way [( )] binding into its property-binding and event-binding halves"
  ],
  sections: [
    { heading: "Three directions of data flow",
      html: `
<p>In 1.3 you built <code>AuthRequestCardComponent</code> and in 1.4 you rendered the review queue with <code>@for</code> and <code>@switch</code>. But the card is still read-only — a nurse reviewer can look at an <code>AuthRequest</code>, not act on it. Approve and Deny buttons need data to flow <em>out</em> of the template, not just in. Angular's binding syntax encodes direction, so you can read a template and know exactly which way data moves:</p>
<table>
<tr><th>Syntax</th><th>Name</th><th>Direction</th></tr>
<tr><td><code>[disabled]="expr"</code></td><td>Property binding</td><td>Component → DOM</td></tr>
<tr><td><code>(click)="handler()"</code></td><td>Event binding</td><td>DOM → Component</td></tr>
<tr><td><code>[(value)]="field"</code></td><td>Two-way binding</td><td>Both — sugar for the other two</td></tr>
</table>
<div class="callout">Read the punctuation as a mnemonic: square brackets push values <em>into</em> the box, parentheses catch events coming <em>out</em>, and the banana-in-a-box <code>[( )]</code> is literally both wrappers at once.</div>`
    },
    { heading: "Property binding: state flows into the DOM",
      html: `
<p>Interpolation <code>{{ }}</code> only produces text. To set a DOM <em>property</em> — a boolean <code>disabled</code>, a numeric width, an object — you need <code>[prop]="expression"</code>. The expression is re-evaluated when its signals change, so the DOM tracks component state without any manual updates. In the card, business rules become bindings:</p>
<pre><code class="language-html">&lt;!-- auth-request-card.component.html --&gt;
&lt;article class="card" [class.expedited]="request().urgency === 'EXPEDITED'"&gt;
  &lt;h3&gt;{{ request().member.lastName }}, {{ request().member.firstName }}&lt;/h3&gt;

  &lt;!-- style binding with a unit suffix: number in, CSS out --&gt;
  &lt;div class="confidence-track"&gt;
    &lt;div class="confidence-fill"
         [style.width.%]="request().confidenceScore * 100"
         [class.auto-zone]="request().confidenceScore &gt;= threshold"&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- attribute binding: aria-* has no DOM property, so use attr. --&gt;
  &lt;span [attr.aria-label]="'Confidence score ' + request().confidenceScore"&gt;
    {{ request().confidenceScore }}
  &lt;/span&gt;

  &lt;!-- a decision is only legal while the request is under review --&gt;
  &lt;button class="approve" [disabled]="request().status !== 'IN_REVIEW'"&gt;Approve&lt;/button&gt;
  &lt;button class="deny"    [disabled]="request().status !== 'IN_REVIEW'"&gt;Deny&lt;/button&gt;
&lt;/article&gt;</code></pre>
<p>Templates can only see members of the component class, so the threshold constant from 1.1 is exposed as a field:</p>
<pre><code class="language-ts">import { AUTO_APPROVE_THRESHOLD } from '../domain/models';

export class AuthRequestCardComponent {
  request = input.required&lt;AuthRequest&gt;();   // from 1.3
  protected readonly threshold = AUTO_APPROVE_THRESHOLD; // 0.85
}</code></pre>
<p>Note the distinction <code>[attr.aria-label]</code> makes explicit: property bindings set live DOM object properties; attribute bindings write HTML attributes for the cases (ARIA, SVG, <code>colspan</code>) where no property exists. <code>[class.x]</code> and <code>[style.y]</code> are targeted single-value forms — no string concatenation of class lists, no fighting over who owns the <code>class</code> attribute.</p>`
    },
    { heading: "Event binding: intent flows out",
      html: `
<p>Data in is only half a UI. <code>(event)="statement"</code> runs a component method when the DOM fires that event — and because signals drive change detection (1.3), any state the handler updates re-renders exactly the bindings that read it. When you need the native event object, Angular provides it under the reserved name <code>$event</code>:</p>
<pre><code class="language-ts">export class AuthRequestCardComponent {
  request = input.required&lt;AuthRequest&gt;();
  protected readonly threshold = AUTO_APPROVE_THRESHOLD;

  onApprove(event: MouseEvent): void {
    // the whole card is clickable (opens the detail view),
    // so a button click must not also trigger the card's handler:
    event.stopPropagation();
    console.log('approve clicked for', this.request().id);
  }

  onDeny(event: MouseEvent): void {
    event.stopPropagation();
    console.log('deny clicked for', this.request().id);
  }
}</code></pre>
<pre><code class="language-html">&lt;button class="approve"
        [disabled]="request().status !== 'IN_REVIEW'"
        (click)="onApprove($event)"&gt;Approve&lt;/button&gt;
&lt;button class="deny"
        [disabled]="request().status !== 'IN_REVIEW'"
        (click)="onDeny($event)"&gt;Deny&lt;/button&gt;</code></pre>
<p>Type <code>$event</code> precisely in the method signature — <code>MouseEvent</code> for clicks, <code>KeyboardEvent</code> for keys, <code>Event</code> when you only need <code>target</code>. Declaring it <code>any</code> throws away the compiler contract you built in 1.1. And keep handlers thin: decide <em>what happened</em>, not <em>what the whole app should do about it</em> — that separation is the point of the next section.</p>`
    },
    { heading: "output(): the card announces, the queue decides",
      html: `
<p>Here is the design problem: <code>AuthRequestCardComponent</code> knows a button was clicked, but approving an <code>AuthRequest</code> is queue-level business logic — updating status, later calling the API (2.5), eventually a SignalStore (3.2). A reusable card must not own any of that. The signal-era answer is <code>output()</code>: the card emits a domain event upward and stays ignorant of what its parent does with it.</p>
<pre><code class="language-ts">import { Component, input, output } from '@angular/core';
import { AuthRequest, AUTO_APPROVE_THRESHOLD } from '../domain/models';

@Component({
  selector: 'pa-auth-request-card',
  templateUrl: './auth-request-card.component.html',
})
export class AuthRequestCardComponent {
  request = input.required&lt;AuthRequest&gt;();
  approve = output&lt;string&gt;();   // emits the request id
  deny    = output&lt;string&gt;();

  protected readonly threshold = AUTO_APPROVE_THRESHOLD;

  onApprove(event: MouseEvent): void {
    event.stopPropagation();
    this.approve.emit(this.request().id);
  }

  onDeny(event: MouseEvent): void {
    event.stopPropagation();
    this.deny.emit(this.request().id);
  }
}</code></pre>
<p>The parent subscribes with the same <code>( )</code> syntax it uses for DOM events — a component output and a native event are indistinguishable at the call site, and <code>$event</code> carries the emitted value (a <code>string</code> here, enforced by the <code>output&lt;string&gt;()</code> generic):</p>
<pre><code class="language-ts">// review-queue.component.ts
export class ReviewQueueComponent {
  requests = signal&lt;AuthRequest[]&gt;(SEED_REQUESTS);

  setStatus(id: string, status: AuthStatus): void {
    this.requests.update(list =&gt;
      list.map(r =&gt; r.id === id ? { ...r, status } : r)
    );
  }
}</code></pre>
<pre><code class="language-html">@for (req of requests(); track req.id) {
  &lt;pa-auth-request-card
    [request]="req"
    (approve)="setStatus($event, 'APPROVED')"
    (deny)="setStatus($event, 'DENIED')" /&gt;
}</code></pre>
<p>Emit the <em>id</em>, not the whole object: the queue already owns the array, and an id forces the state change through one place — <code>setStatus</code> — instead of letting children mutate rows they were handed. Use <code>output()</code>, not the legacy <code>@Output()</code> decorator with <code>EventEmitter</code>; the function form needs no extra imports, is not an RxJS Subject in disguise, and pairs with the <code>input()</code> you have used since 1.3.</p>`
    },
    { heading: "Two-way binding: a taste of [( )]",
      html: `
<p>Some UI is genuinely bidirectional — a reviewer-note text box must display component state <em>and</em> push edits back. Writing both bindings by hand works but is noisy, so Angular offers sugar. The rule: <code>[(x)]="field"</code> expands to a property binding <code>[x]</code> plus an event binding <code>(xChange)</code> that assigns <code>$event</code> back:</p>
<pre><code class="language-html">&lt;!-- these two lines are exactly equivalent --&gt;
&lt;pa-review-note [(note)]="draftNote" /&gt;
&lt;pa-review-note [note]="draftNote" (noteChange)="draftNote = $event" /&gt;</code></pre>
<p>Any component with an <code>x</code> input and an <code>xChange</code> output of the matching type gets <code>[(x)]</code> for free — the <code>Change</code> suffix is the contract, not a convention you can rename. That is all you need to <em>read</em> two-way bindings in the wild. Writing them well is a Track 2 topic: the <code>model()</code> signal collapses the input/output pair into a single writable signal, and 2.8 gives it the full treatment alongside typed forms binding the intake flow in 2.3. For now, when you see the banana in a box, mentally desugar it.</p>`
    },

<p>Angular gives you two tools for this, both reusable across every component that needs them:</p>

<p>A third category — structural directives that add or remove DOM — is mostly obsolete for everyday use: the <code>@if</code>/<code>@for</code>/<code>@switch</code> control flow from 1.4 replaced it. Authoring your own structural directive is a genuinely advanced technique we defer to 3.5.</p>`

<p>Reading the arguments: <code>date: 'MMM d, y, h:mm a'</code> renders "Jul 7, 2026, 9:14 AM"; <code>number: '1.2-2'</code> means at least 1 integer digit, exactly 2 decimal digits — so <code>0.8532179</code> displays as <code>0.85</code>, matching the precision of <code>AUTO_APPROVE_THRESHOLD</code> (0.85) that reviewers reason about. <code>titlecase</code> fixes the all-caps member names the legacy eligibility system sends.</p>

<pre><code class="language-ts">import { Pipe, PipeTransform } from '@angular/core';
import { AuthStatus } from '../domain/models';

const BADGE_LABELS: Record&lt;AuthStatus, string&gt; = {
  DRAFT:      'Draft',
  SUBMITTED:  'Submitted',
  IN_REVIEW:  'In Review',
  APPROVED:   'Approved',
  DENIED:     'Denied',
  PENDED:     'Pended — needs info',
};

@Pipe({ name: 'statusBadge' })
export class StatusBadgePipe implements PipeTransform {
  transform(status: AuthStatus): string {
    return BADGE_LABELS[status];
  }
}</code></pre>
<p><code>Record&lt;AuthStatus, string&gt;</code> (the utility-type move from 1.1) makes the map exhaustive: add a seventh status to <code>AuthStatus</code> and this file fails to compile until you add its label. Usage is one token in the template: <code>{{ request().status | statusBadge }}</code>.</p>
<p><strong>Purity is the contract that makes pipes cheap.</strong> Every pipe is pure unless you opt out. A pure pipe's <code>transform</code> re-runs only when its input <em>value or reference</em> changes — Angular caches the last result and skips the call otherwise. During a change detection pass over a 200-row queue, that's the difference between 200 dictionary lookups on first render and roughly zero on every pass after. The flip side: a pure pipe cannot see <em>mutation</em>. If a pipe received an <code>AuthRequest</code> object and someone wrote <code>req.status = 'APPROVED'</code> in place, the reference is unchanged and the badge would go stale. Our pipe dodges this by taking the primitive <code>status</code> string — a new status is a new value, guaranteed.</p>
<div class="callout">Design pipes to take primitives or immutable data. If you're reaching for an impure pipe — transform running on every change detection cycle, per row, per pass — the real fix is almost always a <code>computed()</code> signal on the component instead (2.6 makes this precise).</div>`

<pre><code class="language-ts">import { Directive, computed, input } from '@angular/core';
import { AuthRequest } from '../domain/models';

const SLA_HOURS = { EXPEDITED: 72, STANDARD: 336 } as const;

@Directive({
  selector: '[highlightOverdue]',
  host: {
    '[class.overdue]': 'isOverdue()',
    '[attr.aria-label]': "isOverdue() ? 'Past SLA — review immediately' : null",
  },
})
export class HighlightOverdueDirective {
  request = input.required&lt;AuthRequest&gt;({ alias: 'highlightOverdue' });

  isOverdue = computed(() =&gt; {
    const req = this.request();
    if (req.status !== 'SUBMITTED' &amp;&amp; req.status !== 'IN_REVIEW') return false;
    if (!req.submittedAt) return false;
    const ageHours =
      (Date.now() - new Date(req.submittedAt).getTime()) / 3_600_000;
    return ageHours &gt; SLA_HOURS[req.urgency];
  });
}</code></pre>
<p>Three things to read carefully. First, the <code>input.required&lt;AuthRequest&gt;()</code> signal input uses an <code>alias</code> matching the selector, so attaching and binding are one attribute: <code>&lt;article [highlightOverdue]="request()"&gt;</code> — the same square-bracket property binding from 1.5, just landing on a directive instead of a component. Second, <code>isOverdue</code> is a <code>computed</code>: it re-evaluates only when the request input changes. Third, the <code>host</code> object binds class and attribute <em>declaratively</em> — Angular applies them during change detection, and only the decided states (<code>APPROVED</code>, <code>DENIED</code>) and drafts are exempt from the clock.</p>
<p>You may see older code inject the element and mutate it imperatively:</p>

  id: "1.7",

  title: "Standalone Components (and where NgModules went)",
  duration: "45 min",
  objectives: [
    "Explain why standalone components replaced NgModules as Angular's default unit of composition",
    "Declare a component's template dependencies explicitly with the imports array",
    "Migrate legacy NgModule-based code using the ng generate @angular/core:standalone schematic",
    "Read legacy NgModule code fluently and map each decorator field to its standalone equivalent"
  ],
  sections: [
    { heading: "Where NgModules went",
      html: `
<p>Everything you have built since 1.2 — <code>AuthRequestCardComponent</code>, the <code>statusBadge</code> pipe, the <code>highlightOverdue</code> directive — worked without a single NgModule. That is not an omission; it is the point of this module. For Angular's first eight years, every component had to be registered in an NgModule, and the module — not the component — decided what was visible in every template it owned. The cost was indirection: to answer "why does this pipe work in this template?" you had to trace the component to its module, then walk that module's import graph.</p>
<p>Since Angular 19, <strong>standalone is the default</strong>. A component, directive, or pipe declares its own dependencies, and the decorator you have been writing all track is the whole story. Angular 20 keeps NgModules working for backward compatibility, but new code never needs one — which is why this course teaches them once, here, as a <em>reading skill</em> for the legacy code you will inherit.</p>
<div class="callout">A standalone component is self-describing: its decorator lists everything its template uses. There is no second file to consult and no ambient scope to reason about.</div>`
    },
    { heading: "The imports array: explicit beats ambient",
      html: `
<p>The problem the <code>imports</code> array solves: in module-based Angular, importing <code>CommonModule</code> anywhere in a module gave <em>every</em> component in that module access to a grab-bag of pipes and directives — whether they used them or not. Scope was module-wide and invisible at the component level. Standalone flips this: each component names exactly what its template consumes.</p>
<pre><code class="language-ts">import { Component, input } from '@angular/core';
import { DatePipe } from '@angular/common';
import { StatusBadgePipe } from './status-badge.pipe';
import { HighlightOverdueDirective } from './highlight-overdue.directive';
import { AuthRequest } from '../domain/models';

@Component({
  selector: 'pa-auth-request-card',
  imports: [DatePipe, StatusBadgePipe, HighlightOverdueDirective],
  templateUrl: './auth-request-card.component.html',
})
export class AuthRequestCardComponent {
  readonly request = input.required&lt;AuthRequest&gt;();
}</code></pre>
<p>And the template consumes exactly those three things — the pipe from 1.6, the directive from 1.6, and Angular's <code>DatePipe</code>:</p>
<pre><code class="language-html">@if (request().status !== 'DRAFT') {
  &lt;span [highlightOverdue]="request()"&gt;
    {{ request().status | statusBadge }}
  &lt;/span&gt;
  &lt;time&gt;{{ request().submittedAt | date:'MMM d' }}&lt;/time&gt;

<p>You will rarely migrate by hand. Angular ships a three-step schematic, and the order matters: declarations must become standalone <em>before</em> their modules can be deleted, and the bootstrap can only switch once the root module is gone.</p>

<p>Step 1 rewrites each declarable to carry its own <code>imports</code> array, computed from what its old module provided. Step 3 replaces the legacy entry point with the one <code>pa-portal</code> has used since 1.2:</p>

<table>

</table>
<p>Two traps when reading: an <code>exports</code> list that omits a declared component means it was <em>module-private</em> — after migration, nothing enforces that privacy except code review. And a service in a lazy-loaded module's <code>providers</code> was scoped to that module's injector; moving it to <code>providedIn: 'root'</code> silently widens it to a singleton, which matters if it held per-feature state.</p>`

    "Explain why shared state and data access belong in services, not components",

  sections: [
    { heading: "Components should not own shared data",
      html: `
<p>In Track 1 the review queue component carried its own hard-coded array of <code>AuthRequest</code> objects — fine for learning templates, wrong for a real portal. The moment a second component needs the same data (a header badge showing how many requests are <code>IN_REVIEW</code>, a detail panel in 2.8), you have two copies. A nurse approves a request in the queue and the header still shows the old count. In a prior authorization tool, a stale count is not cosmetic — it is a reviewer trusting a number that lies.</p>
<p>The fix is old and boring, which is why it works: move the data and the operations on it into a <strong>service</strong> — a plain class with one job — and let Angular hand <em>the same instance</em> to every class that asks. That handing-out mechanism is <strong>dependency injection</strong> (DI). Two payoffs:</p>
<p><strong>One instance of shared state.</strong> Queue, header, and detail panel all read from the single <code>AuthRequestService</code>; an approval in one place is instantly the truth everywhere. <strong>Testability.</strong> A component that <em>asks</em> for its data source can be handed a fake one in a test (module 3.7) — a component that hard-codes its data cannot.</p>
<div class="callout">Rule for this course: components render and delegate; services own state and logic. If a component holds an array of domain entities, that array is in the wrong place.</div>`
    },
    { heading: "@Injectable and providedIn: 'root'",
      html: `
<p>How does Angular know a class is injectable, and how many instances should exist? Both answers live on the class itself:</p>
<pre><code class="language-ts">import { Injectable } from '@angular/core';

@Injectable({ providedIn: 'root' })
export class AuthRequestService {
  // state and methods come in the next sections
}</code></pre>
<p><code>providedIn: 'root'</code> registers the service with the application's <strong>root injector</strong>: one instance, created lazily the first time something injects it, shared for the lifetime of the app. This is what you want for domain state like auth requests.</p>
<p>It is also <strong>tree-shakable</strong>. Because the service registers itself from its own declaration — instead of being listed in some central registry file — a service that nothing injects has no references anywhere. The bundler proves that with static analysis and drops the class from the production bundle. Registry-style registration (the old NgModule providers arrays you read about in 1.7) defeated that analysis: the registry always referenced the class, so it always shipped.</p>
<table><tr><th>Where provided</th><th>Instances</th><th>Use when</th></tr>
<tr><td><code>providedIn: 'root'</code></td><td>One for the whole app</td><td>Shared domain state, API access — the default</td></tr>
<tr><td>A component's <code>providers</code> array</td><td>One per component instance (and its subtree)</td><td>Rare: per-instance scratch state; covered in 3.6</td></tr></table>`
    },
    { heading: "inject(): asking for a dependency",
      html: `
<p>Registration is half the story; the other half is how a class <em>receives</em> a dependency. The modern answer is the <code>inject()</code> function, called in a field initializer:</p>
<pre><code class="language-ts">import { Component, inject } from '@angular/core';
import { AuthRequestService } from '../core/auth-request.service';

@Component({
  selector: 'pa-review-queue',
  templateUrl: './review-queue.component.html'
})
export class ReviewQueueComponent {
  private readonly authRequests = inject(AuthRequestService);
}</code></pre>
<p><code>inject()</code> only works inside an <strong>injection context</strong> — field initializers, the constructor body, or provider factory functions — because that is the only window in which Angular knows <em>which</em> injector is building <em>which</em> class. Call it later (say, inside a click handler) and you get runtime error <code>NG0203</code>. The type flows through: <code>inject(AuthRequestService)</code> returns <code>AuthRequestService</code>, no cast, exactly like the generics you read in 1.1.</p>
<p>You will still meet the legacy form in older codebases — the same request, expressed as a constructor parameter:</p>
<pre><code class="language-ts">// Legacy style — read it, don't write it in this course:
constructor(private authRequests: AuthRequestService) {}</code></pre>
<p>It works, but <code>inject()</code> composes better: it keeps working in inheritance hierarchies without repeating constructor signatures, and it is the only form usable inside reusable helper functions. Services inject other services the same way — <code>inject()</code> in a field initializer works in any class the injector constructs, not just components.</p>`
    },
    { heading: "An in-memory AuthRequestService",
      html: `
<p>The backend API arrives in 2.5. Until then the queue needs realistic data with a realistic shape, so the service holds mock <code>AuthRequest</code> objects (the interface from 1.1) behind a signal — a reactive value holder you read by calling it and change with <code>update()</code>. Module 2.6 goes deep on signals; today we only need those two moves.</p>
<pre><code class="language-ts">import { Injectable, signal } from '@angular/core';
import { AuthRequest, AuthStatus } from '../domain/models';

const SEED: AuthRequest[] = [
  {
    id: 'PA-1001',
    member: { memberId: 'M-778', firstName: 'Rosa', lastName: 'Nguyen',
              plan: 'PPO', eligibleThrough: '2026-12-31' },
    provider: { npi: '1093817465', name: 'Dr. Alan Reyes',
                specialty: 'Orthopedics', inNetwork: true },
    procedureCode: '29881', urgency: 'STANDARD',
    status: 'IN_REVIEW', confidenceScore: 0.91,
    submittedAt: '2026-07-01T14:02:00Z'
  },
  {
    id: 'PA-1002',
    member: { memberId: 'M-431', firstName: 'Devon', lastName: 'Clark',
              plan: 'HMO', eligibleThrough: '2026-09-30' },
    provider: { npi: '1558342201', name: 'Summit Imaging Center',
                specialty: 'Radiology', inNetwork: false },
    procedureCode: '70553', urgency: 'EXPEDITED',
    status: 'IN_REVIEW', confidenceScore: 0.62,
    submittedAt: '2026-07-02T09:15:00Z'
  }
];

@Injectable({ providedIn: 'root' })
export class AuthRequestService {
  private readonly state = signal&lt;AuthRequest[]&gt;(SEED);
  readonly requests = this.state.asReadonly();

  byId(id: string): AuthRequest | undefined {
    return this.state().find(r =&gt; r.id === id);
  }

  approve(id: string): void { this.setStatus(id, 'APPROVED'); }
  deny(id: string): void { this.setStatus(id, 'DENIED'); }

  private setStatus(id: string, status: AuthStatus): void {
    this.state.update(list =&gt;
      list.map(r =&gt; r.id === id ? { ...r, status } : r));
  }
}</code></pre>
<p>Two deliberate choices. The writable signal is <code>private</code>; consumers get <code>requests</code>, a read-only view via <code>asReadonly()</code>. Every status transition — <code>IN_REVIEW</code> to <code>APPROVED</code> or <code>DENIED</code> — must go through a named method, so the rules of the domain live in one auditable place. And <code>setStatus</code> replaces the array and the changed object instead of mutating them, the immutability habit that pays off in 2.6 and 3.2.</p>`

<p>Now the queue from 1.4 drops its local array and reads from the service. The card component from 1.3/1.5 does not change at all — it still takes a request in and emits approve/deny events out. Only its parent's data source moved:</p>

  private readonly authRequests = inject(AuthRequestService);
  readonly queue = this.authRequests.requests;

  approve(id: string): void { this.authRequests.approve(id); }
  deny(id: string): void { this.authRequests.deny(id); }
}</code></pre>
<pre><code class="language-html">@for (req of queue(); track req.id) {

    [request]="req"

<p>To prove the single instance, add a header badge that injects the <em>same</em> service:</p>
<pre><code class="language-ts">import { Component, computed, inject } from '@angular/core';

<p>Click Approve on a card: the card's status badge (your 1.6 pipe) flips to <code>APPROVED</code> <em>and</em> the header count drops by one. No events between the two components, no shared parent coordinating them — just two readers of one root-provided instance.</p>`

{
  id: "2.3",
  track: 2,
  title: "Typed Reactive Forms",
  duration: "60 min",
  objectives: [
    "Explain the FormControl<string> contract and why nullability follows from reset()",
    "Build the intake form as a fully typed FormGroup with FormBuilder.nonNullable",
    "Manage a variable-length list of CPT procedure codes with FormArray",
    "Write a custom ValidatorFn that enforces the member eligibility date",
    "Move a validated form into the AuthRequest DRAFT shape from 1.1 with getRawValue()"
  ],
  sections: [
    { heading: "Why typed forms: the FormControl contract",
      html: `
<p>For most of Angular's history, <code>form.value</code> was typed <code>any</code> — a hole in the exact place you can least afford one. The intake form is where a prior authorization enters the system: a mistyped member ID or a malformed CPT code here becomes a <code>PENDED</code> request and a delayed procedure downstream. Since Angular 14, reactive forms are generic, and in Angular 20 they are simply how you write them: the control's value type is part of its declaration, checked everywhere it flows.</p>
<pre><code class="language-ts">const memberId = new FormControl('M100234');
// inferred: FormControl&lt;string | null&gt;

memberId.reset();
// value is now null — that null is why it's in the type

const procedureCode = new FormControl('99213', { nonNullable: true });
// inferred: FormControl&lt;string&gt;

procedureCode.reset();
// back to '99213', the initial value — null is unreachable, so it left the type</code></pre>
<p>Read that carefully, because it is the whole typed-forms mental model: <strong>the type describes every value the control can actually reach at runtime</strong>. A default <code>reset()</code> sets <code>null</code>, so <code>null</code> is in the contract. Opt into <code>nonNullable</code> and <code>reset()</code> restores the initial value instead — the compiler drops <code>| null</code> because the runtime can no longer produce it. Our domain models from 1.1 have no nulls in them, so the intake form is nonNullable throughout.</p>
<div class="callout">The generic on a FormControl is not decoration — it is the same "make invalid states unrepresentable" discipline from 1.1, applied to user input.</div>`
    },
    { heading: "The intake FormGroup: FormBuilder.nonNullable",
      html: `
<p>Hand-constructing every control with <code>{ nonNullable: true }</code> gets noisy fast. <code>NonNullableFormBuilder</code> is the same builder you may have seen as <code>FormBuilder</code>, with the nonNullable default baked in. This is the intake form's core — member lookup, service date, urgency, and clinical notes:</p>
<pre><code class="language-ts">// src/app/intake/intake-form.ts
import { Component, inject, signal } from '@angular/core';
import { NonNullableFormBuilder, ReactiveFormsModule, Validators } from '@angular/forms';
import { Member } from '../domain/models';

@Component({
  selector: 'pa-intake-form',
  imports: [ReactiveFormsModule],
  templateUrl: './intake-form.html'
})
export class IntakeForm {
  private readonly fb = inject(NonNullableFormBuilder);   // inject(), as in 2.1
  readonly member = signal&lt;Member | undefined&gt;(undefined); // set by lookup

  readonly form = this.fb.group({
    memberId: this.fb.control('', Validators.required),
    serviceDate: this.fb.control('', Validators.required),
    urgency: this.fb.control&lt;'STANDARD' | 'EXPEDITED'&gt;('STANDARD'),
    clinicalNotes: this.fb.control('')
  });
}</code></pre>
<p>Hover <code>this.form</code> in your editor: the inferred type is a <code>FormGroup</code> whose <code>controls</code> object lists each control by name, each one <code>FormControl&lt;string&gt;</code> — except <code>urgency</code>, which carries the literal union straight from 1.1. That inference is load-bearing: <code>this.form.controls.memberId</code> is a real property access, so a typo like <code>controls.membrId</code> is a compile error, not a silent <code>undefined</code> the way string-indexed <code>form.get('membrId')</code> would be. Prefer <code>controls.</code> access everywhere.</p>`
    },
    { heading: "FormArray: a variable number of procedure codes",
      html: `
<p>One authorization often covers several procedures — a colonoscopy with anesthesia is two CPT codes. You cannot know the count at compile time, and that is exactly the case <code>FormArray</code> exists for: a homogeneous, growable list of controls with one shared element type, <code>FormArray&lt;FormControl&lt;string&gt;&gt;</code>.</p>
<pre><code class="language-ts">readonly form = this.fb.group({
  memberId: this.fb.control('', Validators.required),
  serviceDate: this.fb.control('', Validators.required),
  urgency: this.fb.control&lt;'STANDARD' | 'EXPEDITED'&gt;('STANDARD'),
  clinicalNotes: this.fb.control(''),
  procedureCodes: this.fb.array([this.codeControl()])   // start with one row
});

private codeControl() {
  return this.fb.control('', [Validators.required, Validators.pattern(/^\d{5}$/)]);
}

addCode()          { this.form.controls.procedureCodes.push(this.codeControl()); }
removeCode(i: number) { this.form.controls.procedureCodes.removeAt(i); }</code></pre>
<p>The template binds the array with <code>formArrayName</code> and iterates its <code>controls</code> with the <code>@for</code> block from 1.4:</p>
<pre><code class="language-html">&lt;div formArrayName="procedureCodes"&gt;
  @for (code of form.controls.procedureCodes.controls; track $index) {
    &lt;input [formControlName]="$index" placeholder="CPT code" /&gt;
    @if (code.hasError('pattern') &amp;&amp; code.touched) {
      &lt;span class="error"&gt;CPT codes are exactly 5 digits&lt;/span&gt;

    &lt;button type="button" (click)="removeCode($index)"&gt;Remove&lt;/button&gt;
  }
&lt;/div&gt;
&lt;button type="button" (click)="addCode()"&gt;Add procedure code&lt;/button&gt;</code></pre>
<p>Note the division of labor: if the fields were fixed and heterogeneous (member ID next to urgency), a group is right; when they are interchangeable repetitions of one shape, an array is. Mixing that up is the most common forms modeling mistake.</p>`
    },
    { heading: "Validators: built-in guards and the eligibility rule",
      html: `
<p><code>Validators.required</code> and <code>Validators.pattern(/^\d{5}$/)</code> already reject empty and malformed CPT codes before the NestJS API ever sees them. But the rule that actually protects patients is a business rule: <strong>the requested service date must fall within the member's coverage</strong>. The <code>Member</code> interface from 1.1 carries <code>eligibleThrough</code> as an ISO date — and a validator is just a pure function, so we write one:</p>
<pre><code class="language-ts">// src/app/intake/eligible-through.ts
import { AbstractControl, ValidationErrors, ValidatorFn } from '@angular/forms';
import { Member } from '../domain/models';

export function eligibleThrough(getMember: () =&gt; Member | undefined): ValidatorFn {
  return (control: AbstractControl&lt;string&gt;): ValidationErrors | null =&gt; {
    const member = getMember();
    if (!member || !control.value) return null;        // nothing to judge yet

]),</code></pre>

&lt;button type="submit" [disabled]="form.invalid"&gt;Save draft&lt;/button&gt;</code></pre>
