/* ════════════════════════════════════════════════════════════════
   ENGINE — do not modify per-module. Renders whatever is in MODS.
   ════════════════════════════════════════════════════════════════ */
const store = {
  get done(){ try{return JSON.parse(localStorage.getItem('am-done')||'[]')}catch{return[]} },
  markDone(id){ const d=new Set(this.done); d.add(id); localStorage.setItem('am-done',JSON.stringify([...d])) }
};
let current = null;

function byTrack(){
  const g={}; for(const m of MODS){ (g[m.track] ||= []).push(m); } return g;
}

function renderSidebar(){
  const g=byTrack(); const el=document.getElementById('sidebar');
  let h=`<div class="brand" onclick="showHome()" style="cursor:pointer">
    <h1>Angular Mastery</h1><div class="sub">Prior Auth Portal · 42 modules</div></div>`;
  for(const t of Object.keys(TRACKS)){
    const mods=g[t]||[]; const tr=TRACKS[t];
    const open=(current && String(current.track)===String(t)) ? 'open' : (t==='1'?'open':'');
    h+=`<div class="track ${open}" data-track="${t}">
      <div class="track-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="track-pill" style="background:${tr.color}">T${t}</span>
        <span class="track-name">${tr.name}</span>
        <span class="track-count">${mods.length}/${tr.total}</span>
      </div><div class="track-mods">`;
    for(const m of mods){
      const done=store.done.includes(m.id)?'done':'';
      const active=(current&&current.id===m.id)?'active':'';
      h+=`<div class="mod-link ${done} ${active}" onclick="showMod('${m.id}')">
        <span class="mid">${m.id}</span><span>${m.title}</span></div>`;
    }
    h+=`</div></div>`;
  }
  el.innerHTML=h;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showHome(){
  current=null; renderSidebar();
  const built=MODS.length;
  document.getElementById('main').innerHTML=`<div class="home">
    <div class="eyebrow" style="color:var(--ink-faint)">Beginner → Advanced → single-spa → Performance → Production</div>
    <h2>Angular Mastery</h2>
    <p>Build the <strong>Prior Auth Portal</strong> frontend end to end — the Angular counterpart
    to the NestJS backend course. Six tracks, 42 modules, every lab in one shared domain.</p>
    <p>Every module ships a dual-path lab: <strong>Understand It</strong> (hands-on, no AI) and
    <strong>Build It with AI</strong> (Claude Code prompts with mechanical acceptance criteria).</p>
    <div class="status-strip">
      ${['DRAFT','SUBMITTED','IN_REVIEW','APPROVED','DENIED','PENDED'].map(s=>`<span class="status-chip">${s}</span>`).join('')}
    </div>
    <p style="font-family:var(--font-mono);font-size:13px;color:var(--ink-faint)">${built} / 42 modules built · progress saved locally</p>
  </div>`;
}

function showMod(id){
  const m=MODS.find(x=>x.id===id); if(!m) return;
  current=m; renderSidebar();
  const tr=TRACKS[m.track];
  document.documentElement.style.setProperty('--accent', tr.color.match(/--t\d/) ? getComputedStyle(document.documentElement).getPropertyValue('--t'+m.track).trim() : tr.color);

  let h=`<div class="eyebrow"><span>Track ${m.track} · ${tr.name}</span><span class="dur">${m.duration}</span></div>
  <h2 class="mod-title">${m.id} — ${m.title}</h2>
  <div class="objectives"><h4>You will be able to</h4><ul>${m.objectives.map(o=>`<li>${o}</li>`).join('')}</ul></div>`;

  for(const s of m.sections){ h+=`<div class="section"><h3>${s.heading}</h3>${s.html}</div>`; }

  h+=`<div class="lab">
    <div class="lab-head"><div class="eyebrow">Lab · dual path</div></div>
    <div class="lab-scenario">${m.lab.scenario}</div>
    <div class="lab-tabs">
      <div class="lab-tab active" onclick="labTab(this,0)">UNDERSTAND IT</div>
      <div class="lab-tab" onclick="labTab(this,1)">BUILD IT WITH AI</div>
    </div>
    <div class="lab-body" data-pane="0">
      <ol>${m.lab.understandIt.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>
    </div>
    <div class="lab-body" data-pane="1" style="display:none">
      <h5>Prompts for Claude Code</h5>
      ${m.lab.buildItWithAI.prompts.map(p=>`<div class="prompt">${esc(p)}</div>`).join('')}
      <h5>Acceptance criteria</h5>
      <ol>${m.lab.buildItWithAI.acceptance.map(a=>`<li>${esc(a)}</li>`).join('')}</ol>
    </div>
  </div>`;

  h+=`<div class="quiz"><h3>Check yourself</h3>`;
  m.quiz.forEach((q,qi)=>{
    h+=`<div class="qcard"><div class="q">${qi+1}. ${q.q}</div>
      ${q.options.map((o,oi)=>`<button class="opt" onclick="answer(this,${qi},${oi})">${esc(o)}</button>`).join('')}
      <div class="explain" id="ex-${qi}">${q.explain}</div></div>`;
  });
  h+=`</div>`;

  const idx=MODS.indexOf(m);
  h+=`<div class="mod-nav">
    <button ${idx===0?'disabled':''} onclick="showMod('${idx>0?MODS[idx-1].id:''}')">← Prev</button>
    <button onclick="store.markDone('${m.id}');renderSidebar()">Mark complete ✓</button>
    <button ${idx===MODS.length-1?'disabled':''} onclick="showMod('${idx<MODS.length-1?MODS[idx+1].id:''}')">Next →</button>
  </div>`;

  const main=document.getElementById('main');
  main.innerHTML=h; window.scrollTo(0,0);
}

function labTab(el,i){
  el.parentElement.querySelectorAll('.lab-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  el.closest('.lab').querySelectorAll('.lab-body').forEach(b=>{
    b.style.display = b.dataset.pane==String(i) ? '' : 'none';
  });
}

function answer(btn,qi,oi){
  const m=current; const q=m.quiz[qi];
  const card=btn.closest('.qcard');
  card.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.answer) b.classList.add('correct');
  });
  if(oi!==q.answer) btn.classList.add('wrong');
  card.querySelector('.explain').classList.add('show');
}

renderSidebar();
showHome();
</script>
</body>
</html>
