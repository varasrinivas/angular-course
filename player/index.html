<p>Since 2.1, <code>AuthRequestService</code> has served <code>AuthRequest</code> rows from an in-memory array. That was the right call — it let you build the card (1.3), the routes (2.2), and the intake form (2.3) without a server. But it lies in two ways a nurse reviewer will notice on day one: decisions vanish on refresh, and the queue never changes when another reviewer acts. The truth lives in the NestJS Prior Auth API. Today we connect to it.</p>
<p><code>HttpClient</code> is Angular's HTTP layer, and it fits everything you've built so far: responses are <strong>typed with generics</strong> (the 1.1 payoff), it's provided through DI (2.1), and cross-cutting concerns ride a pipeline of <strong>interceptors</strong> instead of being copy-pasted into every call.</p>
<p>One honest note up front: HttpClient returns <strong>Observables</strong>, RxJS's async primitive. In this module we use them pragmatically — a <code>pipe</code>, a <code>catchError</code>, a <code>subscribe</code> — and defer the full mental model (streams, operators, signal interop with <code>toSignal</code>) to 2.7. You do not need to master RxJS to ship this module.</p>
<div class="callout">HttpClient requests are cold: building the observable sends nothing. The request goes on the wire only when something subscribes — a <code>get</code> without a <code>subscribe</code> is a network call that never happens.</div>`
    },
    { heading: "provideHttpClient and typed requests",
      html: `
<p>Like everything in Angular 20, HTTP is configured with a provider function in <code>app.config.ts</code> — not the legacy module import you'll still see in older codebases. <code>withInterceptors</code> takes the pipeline as an array; we'll write those two functions in the next section:</p>
<pre><code class="language-ts">// src/app/app.config.ts
import { ApplicationConfig } from '@angular/core';
import { provideHttpClient, withInterceptors } from '@angular/common/http';
import { authTokenInterceptor } from './core/http/auth-token.interceptor';
import { correlationIdInterceptor } from './core/http/correlation-id.interceptor';

export const appConfig: ApplicationConfig = {
  providers: [
    provideHttpClient(
      withInterceptors([authTokenInterceptor, correlationIdInterceptor])
    )
  ]
};</code></pre>
<p>Every request method takes a generic that declares the response shape. This is a promise to the compiler, not a runtime check — declare the type the NestJS API actually returns, and the whole app downstream inherits it:</p>
<pre><code class="language-ts">const http = inject(HttpClient);

// GET the review queue — typed as the models from 1.1:
http.get&lt;AuthRequest[]&gt;('http://localhost:3000/auth-requests');

// PATCH a reviewer decision:
interface DecisionPayload {
  decision: 'APPROVED' | 'DENIED' | 'PENDED';
  reviewerNote?: string;
}

http.patch&lt;AuthRequest&gt;(
  \`http://localhost:3000/auth-requests/\${id}/decision\`,
  { decision: 'APPROVED' } satisfies DecisionPayload
);</code></pre>
<p>The hard-coded base URL is a known debt: module 3.6 replaces it with an injected <code>API_BASE_URL</code> token, and 6.1 makes it runtime configuration. For now, one private field in one service is an acceptable place for it to live.</p>`
    },
    { heading: "Functional interceptors: the cross-cutting seam",
      html: `
<p>Every call to the NestJS API needs a Bearer token, and every call should carry a correlation id so a failed request in the browser can be found in the backend logs. Without interceptors you'd thread headers through every method of every service — and forget one. An interceptor is a function that sees <em>every</em> outgoing request and can rewrite it in one place:</p>
<pre><code class="language-ts">// src/app/core/http/auth-token.interceptor.ts
import { HttpInterceptorFn } from '@angular/common/http';
import { Injectable, inject, signal } from '@angular/core';

@Injectable({ providedIn: 'root' })
export class SessionService {
  readonly token = signal&lt;string | null&gt;(localStorage.getItem('pa.token'));
}

export const authTokenInterceptor: HttpInterceptorFn = (req, next) =&gt; {
  const token = inject(SessionService).token();
  if (!token) return next(req);              // let the 401 teach the user
  return next(req.clone({
    setHeaders: { Authorization: 'Bearer ' + token }
  }));
};

// src/app/core/http/correlation-id.interceptor.ts
export const correlationIdInterceptor: HttpInterceptorFn = (req, next) =&gt;
  next(req.clone({
    setHeaders: { 'X-Correlation-Id': crypto.randomUUID() }
  }));</code></pre>
<p>Three things to internalize. First, <code>HttpInterceptorFn</code> is a plain function — no class, no boilerplate — and it runs in an injection context, so <code>inject()</code> works exactly as it did in 2.1. Second, <code>HttpRequest</code> is <strong>immutable</strong>: you never set headers on <code>req</code>, you <code>clone</code> with changes. Third, array order is execution order on the way out: <code>authTokenInterceptor</code> runs first, then <code>correlationIdInterceptor</code>, then the wire — and responses flow back through the chain in reverse.</p>
<p>The correlation id is the operational payoff. The NestJS backend logs it on every request it handles; when a reviewer reports "my approval failed at 2:14pm", you read the id from the failed request in DevTools and grep the backend logs for the exact line. Module 6.4 wires the same id into frontend error tracking so both halves of the story join automatically.</p>
<div class="callout">Interceptors are for concerns that are true of every request. The moment you find yourself writing <code>if (req.url.includes(...))</code> ladders inside one, that logic belongs in the service making the call.</div>`
    },
    { heading: "Errors are part of the API contract",
      html: `
<p>A queue page that renders blank when the API is down is indistinguishable from an empty queue — in a clinical workflow that ambiguity is unacceptable. When a request fails, HttpClient delivers a typed <code>HttpErrorResponse</code> through the observable's error channel, and <code>catchError</code> is where you translate it into something the UI can show:</p>
<table><tr><th>Signal from the API</th><th><code>status</code></th><th>What it means for the portal</th></tr>
<tr><td>Network / CORS failure</td><td><code>0</code></td><td>The NestJS server is unreachable — nothing was handled</td></tr>
<tr><td>Invalid payload</td><td><code>400</code></td><td>Frontend and backend disagree on the contract — a bug, not a user error</td></tr>
<tr><td>Missing or expired token</td><td><code>401</code></td><td>Session ended; send the user back through sign-in</td></tr>
<tr><td>Decision conflict</td><td><code>409</code></td><td>Another reviewer decided this <code>AuthRequest</code> first — refresh, never retry blindly</td></tr>
<tr><td>Backend fault</td><td><code>5xx</code></td><td>Their problem to fix, yours to display honestly</td></tr></table>
<pre><code class="language-ts">import { HttpErrorResponse } from '@angular/common/http';

function describeFailure(err: HttpErrorResponse): string {
  if (err.status === 0)   return 'Prior Auth API unreachable. Check your connection.';
  if (err.status === 401) return 'Your session expired. Sign in again.';
  if (err.status === 409) return 'Another reviewer already decided this request.';
  return 'Request failed with status ' + err.status + '.';
}</code></pre>
<p>Note the type on the parameter: <code>err</code> inside <code>catchError</code> is <code>unknown</code>-ish by default, and typing it as <code>HttpErrorResponse</code> gives you <code>status</code>, <code>url</code>, and the parsed body on <code>err.error</code>. The 1.1 discipline applies here too — no <code>any</code>, even in failure paths.</p>`
    },
    { heading: "The refactor: AuthRequestService goes HTTP",
      html: `
<p>Here is the test of the architecture from 2.1: swap the service's internals from arrays to HTTP while keeping its public surface — the <code>queue</code> signal and the method names — identical, so the card, the queue page, and the intake flow compile untouched:</p>
<pre><code class="language-ts">// src/app/data/auth-request.service.ts
import { Injectable, inject, signal } from '@angular/core';
import { HttpClient, HttpErrorResponse } from '@angular/common/http';
import { catchError, of } from 'rxjs';
import { AuthRequest } from '../domain/models';

@Injectable({ providedIn: 'root' })
export class AuthRequestService {
  private http = inject(HttpClient);
  private readonly base = 'http://localhost:3000'; // API_BASE_URL token in 3.6

  readonly queue = signal&lt;AuthRequest[]&gt;([]);
  readonly loadFailure = signal&lt;string | null&gt;(null);

  loadQueue(): void {
    this.loadFailure.set(null);
    this.http.get&lt;AuthRequest[]&gt;(this.base + '/auth-requests').pipe(
      catchError((err: HttpErrorResponse) =&gt; {
        this.loadFailure.set(describeFailure(err));
        return of([] as AuthRequest[]);   // recover with an empty, labeled queue
      })
    ).subscribe(rows =&gt; this.queue.set(rows));
  }

  submitDecision(id: string, decision: 'APPROVED' | 'DENIED' | 'PENDED'): void {
    this.http.patch&lt;AuthRequest&gt;(
      \`\${this.base}/auth-requests/\${id}/decision\`,
      { decision }
    ).subscribe(updated =&gt;
      this.queue.update(rows =&gt;
        rows.map(r =&gt; r.id === updated.id ? updated : r)
      )
    );
  }
}</code></pre>
<p>Components never learn HTTP happened: they keep reading <code>queue()</code> in templates, and the signal updates when responses land. Notice the pattern — <em>observables at the edge, signals in the middle</em>. The observable lives and dies inside the service method; the rest of the app stays on the signal-based world it already knows.</p>
<p>Two deliberate naiveties, both scheduled for repair: the bare <code>subscribe</code> bookkeeping gets replaced by <code>toSignal</code> and friends in 2.7, and the race where two rapid decisions can land out of order is exactly the problem 3.1 solves with <code>exhaustMap</code>. Knowing where your code is naive is a feature, not a flaw.</p>`
    },
    { heading: "In the Prior Auth Portal",
      html: `
<p>This module lands in three files: <code>src/app/data/auth-request.service.ts</code> (the refactored service), and <code>src/app/core/http/auth-token.interceptor.ts</code> plus <code>correlation-id.interceptor.ts</code>, registered once in <code>app.config.ts</code>. The intake form from 2.3 gains a real <code>POST /auth-requests</code> on submit using the same pattern, and the queue you'll aggregate with <code>computed</code> in 2.6 is now live backend data — the pending counts and the <code>AUTO_APPROVE_THRESHOLD</code> comparisons there operate on real <code>confidenceScore</code> values from <code>ClinicalCriteria</code> evaluation.</p>
<p>Downstream, this seam keeps paying: 2.7 upgrades the subscribe plumbing to signal interop, 3.1 adds polling and retry, 3.6 swaps the hard-coded base URL for a DI token, 3.8 mocks these exact endpoints in Playwright, and 6.4 joins the <code>X-Correlation-Id</code> you added today to production error reports. One HTTP layer, wired once, leveraged for the rest of the course.</p>`
    }

{

  objectives: [
    "Explain why fine-grained reactivity beats zone-based change detection for the review queue",
    "Hold queue state in a writable signal and mutate it correctly with set and update",

  sections: [
    { heading: "Change detection was checking everything to update one number",
      html: `
<p>By 2.5 the review queue is real: <code>AuthRequestService</code> pulls <code>AuthRequest</code> rows from the NestJS API, interceptors stamp the auth token and correlation id. But watch what happens when one request moves from <code>IN_REVIEW</code> to <code>APPROVED</code>: zone.js sees the click, and Angular re-checks <strong>every binding in the component tree</strong> to discover that one count in the header changed. The framework knows <em>that something happened</em>, not <em>what changed</em>.</p>
<p>That model is tolerable at 30 rows and fatal at the 5,000-row queue we optimize in Track 5. A <strong>signal</strong> inverts it: a signal is a value that records who reads it, and when the value changes it notifies exactly those readers. The template that shows the pending count depends on the queue signal — nothing else needs to be looked at. This is also the road to removing zone.js entirely (<code>provideZonelessChangeDetection</code>, module 3.3): once state changes announce themselves, nobody has to patch <code>setTimeout</code> to guess.</p>
<div class="callout">A signal is a value plus a dependency graph. You get the value with <code>queue()</code> — and that read is also the subscription.</div>`
    },
    { heading: "signal(), set(), update(): the queue becomes a reactive value",
      html: `
<p>A plain class field gives Angular zero information: assign to it and nothing downstream knows. So we hold the queue in a signal — writable inside the service, read-only to everyone else, the same encapsulation instinct as private fields in 2.1's <code>AuthRequestService</code>:</p>
<pre><code class="language-ts">// src/app/review-queue/review-queue.service.ts
import { Injectable, inject, signal } from '@angular/core';
import { HttpClient } from '@angular/common/http';
import { QueueRow } from '../domain/models';

@Injectable({ providedIn: 'root' })
export class ReviewQueueService {
  private http = inject(HttpClient);

  private queueState = signal&lt;QueueRow[]&gt;([]);
  readonly queue = this.queueState.asReadonly();

  load(): void {
    this.http.get&lt;QueueRow[]&gt;('/api/auth-requests')
      .subscribe(rows =&gt; this.queueState.set(rows));
  }

  approve(id: string): void {
    this.queueState.update(rows =&gt;
      rows.map(r =&gt; r.id === id ? { ...r, status: 'APPROVED' as const } : r)
    );
  }
}</code></pre>
<p><code>set</code> replaces the value; <code>update</code> derives the next value from the current one. Note that <code>approve</code> returns a <strong>new array</strong> — signals compare with <code>Object.is</code>, so pushing into the existing array in place would change nothing as far as the graph is concerned. Immutable updates are not a style preference here; they are the notification mechanism.</p>
<p>In a template, you read a signal by calling it — and that call registers the template as a consumer:</p>
<pre><code class="language-ts">@Component({
  selector: 'pa-queue-summary',
  template: \`
    @if (queue().length &gt; 0) {
      &lt;p&gt;{{ queue().length }} requests in the queue&lt;/p&gt;
    } @else {
      &lt;p&gt;Queue is clear — nothing awaiting review&lt;/p&gt;
    }
  \`,
})
export class QueueSummaryComponent {
  protected queue = inject(ReviewQueueService).queue;
}</code></pre>
<p>Contrast with a plain field: <code>{{ rows.length }}</code> only looks current because zone-based change detection happens to re-check it after every event in the app. The signal version is <em>correct by construction</em> — the binding updates because the queue changed, and only then.</p>`
    },
    { heading: "computed(): the auto-approvable count derives itself",
      html: `
<p>The queue header needs two numbers: how many requests await a decision, and how many of those the system could decide on its own. The wrong move is storing these as separate signals you remember to update — that is two more values that can drift out of sync with the queue. Derived state should be <em>declared</em>, not maintained:</p>
<pre><code class="language-ts">import { computed } from '@angular/core';
import { AUTO_APPROVE_THRESHOLD } from '../domain/models';

// inside ReviewQueueService:
readonly pendingCount = computed(() =&gt;
  this.queue().filter(r =&gt;
    r.status === 'IN_REVIEW' || r.status === 'PENDED'
  ).length
);

readonly autoApprovableCount = computed(() =&gt;
  this.queue().filter(r =&gt;
    r.status === 'IN_REVIEW'
    &amp;&amp; r.confidenceScore &gt;= AUTO_APPROVE_THRESHOLD
  ).length
);</code></pre>
<p>That predicate should look familiar — it is <code>isAutoApprovable</code> from module 1.1, now live in the UI. The rule is unchanged: only <code>IN_REVIEW</code> requests qualify (a <code>PENDED</code> request scoring 0.99 is still waiting on information), and the 0.85 boundary is inclusive, imported from <code>models.ts</code> so frontend and backend cannot disagree by one hard-coded decimal.</p>
<p>Two properties make <code>computed</code> cheap enough to use everywhere. It is <strong>lazy</strong>: the filter does not run when the computed is created, only on first read. And it is <strong>memoized</strong>: after that read, the result is cached until a dependency (here, the queue signal) actually changes — read <code>autoApprovableCount()</code> in ten bindings and the filter ran once. A computed is also read-only by design; if you find yourself wanting to set one, the value was not derived state in the first place.</p>`
    },
    { heading: "effect(): pushing the pending count into the browser tab",
      html: `
<p>Nurse reviewers keep the queue pinned in a background tab; the number they glance at is the <em>tab title</em>, and no template binding can reach <code>document.title</code>. This is what <code>effect</code> is for: code that must run against the outside world whenever tracked signals change.</p>
<pre><code class="language-ts">import { Component, effect, inject } from '@angular/core';
import { ReviewQueueService } from './review-queue.service';

@Component({
  selector: 'pa-queue-shell',
  template: \`
    &lt;h1&gt;Review Queue&lt;/h1&gt;
    &lt;p&gt;{{ queueSvc.autoApprovableCount() }} of {{ queueSvc.pendingCount() }}
       eligible for auto-approval&lt;/p&gt;
  \`,
})
export class QueueShellComponent {
  protected queueSvc = inject(ReviewQueueService);

  constructor() {
    effect(() =&gt; {
      const pending = this.queueSvc.pendingCount();
      document.title = pending &gt; 0
        ? \`(\${pending}) Review Queue — Prior Auth Portal\`
        : 'Review Queue — Prior Auth Portal';
    });
  }
}</code></pre>
<p>The effect runs once at startup, records that it read <code>pendingCount</code>, and re-runs whenever that computed produces a new value. It must be created in an <strong>injection context</strong> — a constructor or field initializer — because Angular ties its lifetime to the component; when the shell is destroyed, the effect dies with it, no manual teardown. (Move the <code>effect(...)</code> call into a click handler and you get a runtime error to that effect — try it in the lab.)</p>`
    },
    { heading: "When effect is the wrong tool — and what untracked() is for",
      html: `
<p>The most common signals mistake is using <code>effect</code> to move state between signals:</p>
<pre><code class="language-ts">// DON'T: derived state maintained by hand
private pendingCountBad = signal(0);

constructor() {
  effect(() =&gt; {
    this.pendingCountBad.set(
      this.queue().filter(r =&gt; r.status === 'IN_REVIEW').length
    );
  });
}</code></pre>
<p>It compiles, and it even works — until you notice effects run <em>after</em> the change that triggered them, so there is a window where the queue and the count disagree. Worse, the derivation is now invisible to the dependency graph: nothing states that this signal is a function of the queue. The rule of thumb: <strong>effect for leaving the signal world</strong> (DOM APIs like <code>document.title</code>, logging, <code>localStorage</code>, charting libraries), <strong>computed for staying inside it</strong>. If an effect body ends in <code>.set(</code>, it almost certainly wants to be a computed. Fetching data in response to a signal change is also not an effect job — 2.7 gives you the RxJS interop built for that.</p>
<p>Sometimes an effect must <em>read</em> a signal without <em>depending</em> on it. Our audit log should fire when the auto-approvable count changes — not every time the logged-in reviewer's session refreshes:</p>
<pre><code class="language-ts">import { effect, untracked } from '@angular/core';

effect(() =&gt; {
  const eligible = this.queueSvc.autoApprovableCount(); // tracked
  const reviewer = untracked(this.session.reviewerName); // read, not tracked
  audit(\`\${reviewer} sees \${eligible} auto-approvable requests\`);
});</code></pre>
<div class="callout">Inside a reactive context, every signal read is a subscription — unless you wrap it in <code>untracked</code>. Choose your dependencies deliberately.</div>`
    },

<p>That vocabulary is RxJS. An <code>Observable&lt;T&gt;</code> is a <strong>lazy push stream</strong>: it does nothing until subscribed, and then it pushes zero or more values to you over time, possibly finishing with completion or an error. Signals pull the current value; observables push a sequence of them. The Prior Auth Portal uses both — and this module teaches you exactly where the line is.</p>

  );
}</code></pre>
<p>Why <code>switchMap</code> and not another flattening operator? Type <code>SMIT</code>, pause, then finish <code>SMITH</code> on a slow network. Two requests are now in flight, and nothing guarantees they return in order — if the <code>SMIT</code> response lands last, the nurse selects the wrong <code>Member</code> and an <code>AuthRequest</code> is submitted against the wrong patient. <code>switchMap</code> makes that impossible: when a new query arrives, it <strong>unsubscribes from the previous inner observable</strong>, and because HttpClient requests are cold, unsubscribing physically cancels the XHR. Only the latest lookup can ever emit.</p>

<p><strong>toSignal(source$, options)</strong> — observable in, signal out. It subscribes <em>eagerly</em>, right when called. A signal must always have a current value, but an observable may not have emitted yet — so you either provide <code>initialValue</code> (our empty <code>Member[]</code>), accept <code>undefined</code> in the signal's type if you pass nothing, or assert <code>requireSync: true</code> for sources that emit synchronously on subscribe. It must run in an <strong>injection context</strong> (field initializer or constructor) because it registers its unsubscribe against that component's destruction.</p>
<p><strong>toObservable(sig)</strong> — signal in, observable out. New subscribers get the current value, then subsequent changes. Emissions ride on an effect, so they are <em>asynchronous and coalesced</em>: set a signal three times in one tick and subscribers see only the final value. Same injection-context requirement. Use it when a signal needs to enter an operator pipeline — like fetching eligibility whenever the coordinator picks a member:</p>

<p>Angular 20 gives you a small, complete toolkit, all signal-based:</p>
<table><tr><th>Direction</th><th>API</th><th>Portal example</th></tr>

<p>Module 1.5 previewed <code>model()</code> from the binding side. Today we build all three from the component author's side, then learn where the pattern stops scaling.</p>`

    { heading: "input(): the typed, reactive contract",
      html: `
<p>The old <code>@Input</code> decorator had two chronic problems: every input was silently optional (so <code>undefined</code> leaked into templates), and reacting to changes meant the <code>ngOnChanges</code> ceremony. <code>input()</code> fixes both — an input <strong>is a signal</strong>, so it composes directly with <code>computed()</code> from 2.6, and <code>input.required</code> makes "you forgot to bind this" a build failure instead of a blank panel during a nurse's shift.</p>
<pre><code class="language-ts">import { Component, computed, input, booleanAttribute } from '@angular/core';
import { AuthRequest, AUTO_APPROVE_THRESHOLD } from '../domain/models';

@Component({
  selector: 'pa-request-detail',
  template: \`
    &lt;article class="panel" [class.dense]="dense()"&gt;
      &lt;h2&gt;{{ request().procedureCode }} — {{ request().member.lastName }}&lt;/h2&gt;
      @if (autoApprovable()) {
        &lt;p class="banner"&gt;Meets auto-approve threshold&lt;/p&gt;
      }
    &lt;/article&gt;
  \`
})
export class RequestDetailComponent {
  // The panel is meaningless without a request — a missing binding fails the build.
  request = input.required&lt;AuthRequest&gt;();

  // Optional, with a default and a transform: accepts a bare dense attribute.
  dense = input(false, { transform: booleanAttribute });

  autoApprovable = computed(() =&gt;
    this.request().status === 'IN_REVIEW'
    &amp;&amp; this.request().confidenceScore &gt;= AUTO_APPROVE_THRESHOLD
  );
}</code></pre>
<p>Transforms run before the value becomes the signal's content: <code>booleanAttribute</code> turns <code>&lt;pa-request-detail dense /&gt;</code> into a real <code>true</code>, and a custom function works too — <code>npi = input('', { transform: (v: string) =&gt; v.trim() })</code> normalizes a <code>Provider</code> NPI at the boundary. When the parent later binds a different request, <code>autoApprovable</code> recomputes on its own. No lifecycle hooks, no change-detection guesswork.</p>`

<p>The tempting shortcut is letting the detail panel mutate the request it was handed — it has the object, after all. Resist it: the queue list, the counts from 2.6, and the backend all depend on that state, and a child silently editing its input is how two views of the same <code>AuthRequest</code> disagree. The child <strong>reports</strong>; the owner of the data writes. That report is <code>output()</code>:</p>
<pre><code class="language-ts">import { Component, input, output } from '@angular/core';

export interface ReviewDecision {
  id: string;
  verdict: 'APPROVED' | 'DENIED';
}

@Component({
  selector: 'pa-request-detail',
  template: \`
    &lt;button (click)="decide('APPROVED')"&gt;Approve&lt;/button&gt;
    &lt;button (click)="decide('DENIED')"&gt;Deny&lt;/button&gt;
  \`
})
export class RequestDetailComponent {
  request = input.required&lt;AuthRequest&gt;();
  decided = output&lt;ReviewDecision&gt;();

  decide(verdict: 'APPROVED' | 'DENIED') {
    this.decided.emit({ id: this.request().id, verdict });
  }
}</code></pre>
<p>The parent binds <code>(decided)="onDecided($event)"</code> and calls the <code>AuthRequestService</code> from 2.5 — the child never learns HTTP exists. One subtlety: <code>output()</code> returns an emitter, <em>not</em> a signal. You can't read "the last decision" from it, and that's deliberate — an event is a moment, not state. If you need the latest value as state, you want the next section.</p>
<div class="callout">Data flows down through input(), decisions flow up through output(). The child never mutates what it was given — the same one-way discipline that made the discriminated union from 1.1 trustworthy.</div>`

<p>The parent page composes both children. <code>[(selectedId)]</code> is the banana-in-a-box from 1.5 — it desugars to <code>[selectedId]</code> plus <code>(selectedIdChange)</code>, and binding it straight to a writable signal keeps both sides in lockstep:</p>
<pre><code class="language-ts">@Component({
  selector: 'pa-review-page',
  imports: [QueueListComponent, RequestDetailComponent],
  template: \`
    &lt;pa-queue-list [rows]="queue()" [(selectedId)]="selectedId" /&gt;

    } @else {

})
export class ReviewPageComponent {
  private requests = inject(AuthRequestService);

  queue = this.requests.queue;                  // Signal&lt;AuthRequest[]&gt; from 2.7
  selectedId = signal&lt;string | null&gt;(null);
  selected = computed(() =&gt;
    this.queue().find(r =&gt; r.id === this.selectedId()) ?? null

}</code></pre>
<p>Note what the components exchange: the list owns an <strong>id</strong>, not the object. <code>selected</code> is derived by <code>computed</code>, so when a decision updates the queue signal, the detail panel re-renders the same request in its new status with zero extra wiring. Ids travel; objects are derived where they're needed.</p>`

<p>Master/detail worked because list and panel share a parent. Now the queue toolbar — a sibling on a different template branch — needs the selected <code>Member</code>'s plan, and next sprint a component under another route wants it too. Routing <code>selectedId</code> up through outputs and back down through inputs across components that don't care about it is <strong>prop-drilling</strong>, and every hop is a component coupled to data it merely forwards. The rule of thumb: two hops is fine; the third hop, or any sibling across routes, means the state wasn't the component's to own. Lift it into a service — DI from 2.1 plus signals from 2.6:</p>
<pre><code class="language-ts">import { Injectable, computed, inject, signal } from '@angular/core';

@Injectable({ providedIn: 'root' })
export class SelectionStore {
  private requests = inject(AuthRequestService);

  readonly selectedId = signal&lt;string | null&gt;(null);
  readonly selected = computed(() =&gt;
    this.requests.queue().find(r =&gt; r.id === this.selectedId()) ?? null
  );
}</code></pre>
<p>Queue list, detail panel, and toolbar each <code>inject(SelectionStore)</code> and react to the same signals — no forwarding chain. This tiny class is the seed of the <code>ReviewQueueStore</code> you'll formalize with SignalStore in 3.2; the shape barely changes, only the tooling around it.</p>
<p>Last tool, used sparingly: sometimes the parent needs a <em>handle</em> on a child, not data — focus the note box after a denial, scroll the selected row into view. That's the signal query API:</p>
<pre><code class="language-ts">export class ReviewPageComponent {

  private detail = viewChild(RequestDetailComponent);

  focusNote() { this.noteBox()?.nativeElement.focus(); }
}</code></pre>
<p><code>viewChild()</code> returns a signal (empty until the view initializes — hence the <code>?.</code>), replacing the decorator-and-lifecycle dance of old. <code>contentChild()</code> is the same idea for projected content, which module 3.4 puts to work. Treat queries as an imperative escape hatch for DOM concerns; the moment one becomes a data channel, you've rebuilt prop-drilling with extra steps.</p>`

{
  id: "3.1",
  track: 3,
  title: "Advanced RxJS Patterns",
  duration: "60 min",
  objectives: [
    "Choose the right flattening operator — switchMap, mergeMap, concatMap, or exhaustMap — for a given portal API call",
    "Build a review-queue poller with timer and exhaustMap that never overlaps requests",
    "Add exponential backoff with jitter to failing HTTP calls using the retry operator's delay function",
    "Diagnose a real race condition in the detail panel and fix it with switchMap",
    "Cache shared reference data like the Provider directory with shareReplay"
  ],
  sections: [
    { heading: "One HTTP call is easy — concurrency is the job",
      html: `
<p>In 2.5 you made typed calls to the NestJS API; in 2.7 you debounced a Member typeahead with <code>switchMap</code>. Those modules taught single streams. Production bugs live between streams: a poll fires while the previous poll is still in flight, a retry storm hammers a recovering server, two rapid clicks load two <code>AuthRequest</code> details and the <em>wrong one wins</em>. None of these are exotic — every one of them will happen in the review queue this week.</p>
<p>RxJS solves each with a deliberate concurrency decision, and the decision is always the same question: <strong>when a new outer value arrives while an inner observable is still running, what should happen?</strong> Cancel the old one? Run both? Queue the new one? Ignore the new one? Those four policies are four operators, and picking the wrong one is how race conditions ship.</p>
<div class="callout">Every flattening operator is a concurrency policy. Never pick one by habit — name the policy the business flow needs, then the operator picks itself.</div>`
    },
    { heading: "The flattening-operator decision table",
      html: `
<p>All four operators map an outer emission to an inner observable (usually an HTTP call). They differ only in the overlap policy — so learn them as a table, each row anchored to a real portal call:</p>
<table>
<tr><th>Operator</th><th>Policy when a new outer arrives mid-flight</th><th>Portal call it fits</th></tr>
<tr><td><code>switchMap</code></td><td>Cancel the stale inner, switch to the new one</td><td>Member typeahead (2.7); loading the AuthRequest detail panel — only the latest selection matters</td></tr>
<tr><td><code>mergeMap</code></td><td>Run all inners concurrently; results arrive in completion order</td><td>Writing one audit entry per approved request — independent calls, order irrelevant</td></tr>
<tr><td><code>concatMap</code></td><td>Queue inners; strictly one at a time, in arrival order</td><td>Status transitions on a single AuthRequest (SUBMITTED, then IN_REVIEW, then PENDED) that must hit the API in sequence</td></tr>
<tr><td><code>exhaustMap</code></td><td>Ignore new outers entirely while an inner is in flight</td><td>Polling the review queue; the intake Submit button (a double-click must not create two requests)</td></tr>
</table>
<p>Two failure modes to burn in: <code>mergeMap</code> where you needed <code>switchMap</code> produces out-of-order UI (section 5); <code>switchMap</code> where you needed <code>exhaustMap</code> cancels work that should have been left alone — cancel a poll that was about to resolve and, on a slow link, you can cancel every poll forever, so the queue never refreshes.</p>`
    },
    { heading: "Polling the review queue: timer + exhaustMap",
      html: `
<p>Nurse reviewers keep the queue open all shift; new <code>IN_REVIEW</code> requests must appear without a manual refresh. WebSockets are overkill for a 15-second freshness budget — a poll is the honest tool. The trap is overlap: on a slow connection, a 20-second response to a 15-second poll means requests stack up, each one restating the same question. <code>exhaustMap</code> makes overlap impossible: while one poll is in flight, new ticks are simply discarded.</p>
<pre><code class="language-ts">// src/app/review-queue/review-queue-polling.service.ts
import { Injectable, inject } from '@angular/core';
import { HttpClient } from '@angular/common/http';
import { toSignal } from '@angular/core/rxjs-interop';
import { timer, exhaustMap, catchError, EMPTY } from 'rxjs';
import { AuthRequest } from '../domain/models';

const POLL_INTERVAL_MS = 15_000;

@Injectable({ providedIn: 'root' })
export class ReviewQueuePollingService {
  private http = inject(HttpClient);

  private queue$ = timer(0, POLL_INTERVAL_MS).pipe(
    exhaustMap(() =&gt;
      this.http.get&lt;AuthRequest[]&gt;('/api/auth-requests?status=IN_REVIEW').pipe(
        catchError(() =&gt; EMPTY)   // a failed poll skips a beat, it never kills the poller
      )
    )
  );

  readonly queue = toSignal(this.queue$, { initialValue: [] as AuthRequest[] });
}</code></pre>
<p>Read the shape: <code>timer(0, 15_000)</code> emits immediately and then every 15 seconds; <code>exhaustMap</code> turns each tick into at most one HTTP call; <code>toSignal</code> (from 2.7) hands the template a signal, so the queue component just reads <code>queue()</code>. The <code>catchError(() =&gt; EMPTY)</code> on the <em>inner</em> observable matters: if the inner errors, the error would otherwise propagate outward and complete the timer — one bad response would silently stop all future polls.</p>
<p>With <code>switchMap</code> here, a tick arriving before a slow poll resolves would cancel it — on a degraded network the poller could cancel every request indefinitely. With <code>mergeMap</code>, requests pile up. Ignore-while-busy is exactly the polling contract.</p>`
    },
    { heading: "Resilience: retry with exponential backoff and jitter",
      html: `
<p>The NestJS API will restart mid-shift someday. A naive <code>retry(3)</code> re-fires instantly, three times, from every open browser tab at once — a synchronized stampede at the worst possible moment for a recovering server. The fix is exponential backoff (wait 1s, 2s, 4s, 8s) plus <em>jitter</em> (a random offset so a hundred reviewer tabs don't all retry on the same beat).</p>
<p>Modern RxJS builds this into <code>retry</code> via a delay function — return a timer to schedule the retry, or rethrow to give up:</p>
<pre><code class="language-ts">// src/app/shared/backoff.ts
import { HttpErrorResponse } from '@angular/common/http';
import { timer, throwError } from 'rxjs';

const BASE_DELAY_MS = 1_000;

export function backoffWithJitter(error: unknown, retryCount: number) {
  const status = error instanceof HttpErrorResponse ? error.status : 0;
  if (status &gt;= 400 &amp;&amp; status &lt; 500 &amp;&amp; status !== 429) {
    return throwError(() =&gt; error);  // a 404 is still a 404 in eight seconds
  }
  const backoff = BASE_DELAY_MS * Math.pow(2, retryCount - 1); // 1s, 2s, 4s, 8s
  const jitter = Math.random() * 500;
  return timer(backoff + jitter);
}</code></pre>
<pre><code class="language-ts">// applied to the poller's inner call:
this.http.get&lt;AuthRequest[]&gt;('/api/auth-requests?status=IN_REVIEW').pipe(
  retry({ count: 4, delay: backoffWithJitter }),
  catchError(() =&gt; EMPTY)
)</code></pre>
<p>Note what the guard clause encodes: retrying only makes sense for transient failures — network drops, 5xx, 429 rate limits. A 4xx means the request itself is wrong; retrying it is noise. Placement matters too: <code>retry</code> sits on the inner observable, <em>before</em> <code>catchError</code>, so each poll gets its own retry budget and exhausting it still doesn't stop the poller.</p>`
    },
    { heading: "The detail-panel race, and one request for the whole directory",
      html: `
<p>Here is the race condition, live: a reviewer clicks row A in the queue, then immediately row B. Two GETs go out. A's response is slower and lands <em>after</em> B's — so the panel briefly shows B, then flips to A while the highlighted row still says B. The reviewer is now reading the wrong Member's clinical data. With <code>mergeMap</code> (or a bare subscribe per click) this is not a possibility, it is a guarantee under load.</p>
<pre><code class="language-ts">// queue-detail-panel.component.ts (excerpt)
private http = inject(HttpClient);
private selectedId$ = new Subject&lt;string&gt;();

readonly detail = toSignal(
  this.selectedId$.pipe(
    switchMap(id =&gt;
      this.http.get&lt;AuthRequest&gt;('/api/auth-requests/' + id)
    )
  )
);

select(id: string): void {
  this.selectedId$.next(id);
}</code></pre>
<p><code>switchMap</code> unsubscribes from A's in-flight inner the instant B arrives — and because <code>HttpClient</code> observables abort the underlying request on unsubscribe, the browser actually cancels A's call. Last click always wins. Same operator as the 2.7 typeahead, same reason: only the latest matters.</p>
<p>The opposite problem: the <code>Provider</code> directory is read-only reference data, and five components ask for it. Cold observables re-execute per subscriber — five subscribers, five identical GETs. <code>shareReplay</code> multicasts one execution and replays the last value to late arrivals:</p>
<pre><code class="language-ts">// src/app/providers/provider-directory.service.ts
@Injectable({ providedIn: 'root' })
export class ProviderDirectoryService {
  private http = inject(HttpClient);

  readonly providers$ = this.http.get&lt;Provider[]&gt;('/api/providers').pipe(
    shareReplay({ bufferSize: 1, refCount: true })
  );
}</code></pre>
<p><code>bufferSize: 1</code> replays the latest directory to new subscribers; <code>refCount: true</code> tears the shared subscription down when the last subscriber leaves, so the next subscriber generation fetches fresh data instead of reading a stale cache forever. Omit <code>refCount</code> and the first response is cached for the app's lifetime — usually not what a directory with network-status changes wants.</p>`

{
  id: "3.2",
  track: 3,
  title: "State Management: SignalStore vs NgRx",
  duration: "60 min",
  objectives: [
    "Recognize the symptoms that mean component-and-service state has stopped scaling",
    "Build a SignalStore with withState, withComputed, withMethods, and patchState",

    "Implement optimistic approve/deny updates with rollback when the API rejects them",

  ],
  sections: [
    { heading: "When component state stops scaling",
      html: `
<p>Everything so far has worked without a store. In 2.6 the queue counts lived as signals in a service; in 2.8 the queue list and the detail panel talked through <code>input()</code> and <code>output()</code>; in 3.1 an <code>exhaustMap</code> poll refreshed the data. Then the feature grew, and three symptoms appeared:</p>
<p><strong>Duplication:</strong> the queue list, the detail panel, and the header badge each hold their own copy of the same <code>AuthRequest</code> rows — approve a request in the panel and the badge count is stale until the next poll. <strong>Derivation sprawl:</strong> "how many are auto-approvable" is computed in two components with two subtly different filters. <strong>Update fan-out:</strong> when the poll delivers fresh rows, every holder of a copy must be told, so outputs bubble up and inputs trickle down through components that don't care.</p>
<p>The fix is not more clever wiring. It is a single owner for the review-queue state — one place that holds the rows, derives every view of them, and is the only thing allowed to change them. In Angular 20 the lightest tool that does this properly is <strong>SignalStore</strong> from <code>@ngrx/signals</code>: the same signals you already know, packaged with structure.</p>
<div class="callout">Rule of thumb: the moment two components disagree about the same entity, the entity needs exactly one owner. A store is that owner; components become renderers of it.</div>`
    },
    { heading: "SignalStore anatomy: withState, withComputed, withMethods",
      html: `
<p>A SignalStore is assembled from features, each answering one question. <code>withState</code> declares what the store holds. <code>withComputed</code> declares what can be derived (never stored). <code>withMethods</code> declares the only legal ways to change it. <code>patchState</code> performs the change — immutably, so every dependent signal notifies exactly like the <code>computed</code> chains from 2.6.</p>
<pre><code class="language-ts">// src/app/review-queue/review-queue.store.ts
import { computed, inject } from '@angular/core';
import { signalStore, withState, withComputed,
         withMethods, patchState } from '@ngrx/signals';
import { AUTO_APPROVE_THRESHOLD, AuthStatus } from '../domain/models';

type ReviewQueueState = {
  filter: 'ALL' | 'EXPEDITED';
  loading: boolean;
  error: string | null;
};

const initialState: ReviewQueueState = {
  filter: 'ALL',
  loading: false,
  error: null,
};</code></pre>
<p>Deep signals come for free: <code>store.filter()</code> and <code>store.loading()</code> are real signals, usable in templates and <code>computed()</code> without any selector ceremony. What's deliberately missing from the state shape is the rows themselves — a plain <code>AuthRequest[]</code> makes every update an index hunt. Collections get a dedicated feature, next.</p>`
    },
    { heading: "Entity management for the AuthRequest collection",
      html: `
<p>The review queue is a keyed collection: look up by id, update one row, keep order stable. <code>@ngrx/signals/entities</code> stores it as a normalized id map and hands you atomic updaters, so you never write <code>rows.map(r =&gt; r.id === id ? ... : r)</code> again. Because <code>AuthRequest</code> already has an <code>id</code> field (the 1.1 contract paying off), no configuration is needed:</p>
<pre><code class="language-ts">import { withEntities, setAllEntities,
         updateEntity } from '@ngrx/signals/entities';
import { firstValueFrom } from 'rxjs';
import { AuthRequest } from '../domain/models';
import { AuthRequestService } from '../data/auth-request.service';

export const ReviewQueueStore = signalStore(
  { providedIn: 'root' },
  withState(initialState),
  withEntities&lt;AuthRequest&gt;(),
  withComputed(({ entities, filter }) =&gt; ({
    visible: computed(() =&gt; filter() === 'ALL'
      ? entities()
      : entities().filter(r =&gt; r.urgency === 'EXPEDITED')),
    inReview: computed(() =&gt;
      entities().filter(r =&gt; r.status === 'IN_REVIEW')),
    autoApprovable: computed(() =&gt;
      entities().filter(r =&gt; r.status === 'IN_REVIEW'
        &amp;&amp; r.confidenceScore &gt;= AUTO_APPROVE_THRESHOLD)),
  })),
  withMethods((store, api = inject(AuthRequestService)) =&gt; ({
    async load(): Promise&lt;void&gt; {
      patchState(store, { loading: true, error: null });
      try {
        const rows = await firstValueFrom(api.getQueue());
        patchState(store, setAllEntities(rows), { loading: false });
      } catch {
        patchState(store, { loading: false,
          error: 'Could not load the review queue' });
      }
    },
  }))
);</code></pre>
<p>Notice where the threshold lives now. In 2.6, <code>AUTO_APPROVE_THRESHOLD</code> gated a computed inside one component. Here <code>autoApprovable</code> is <em>the</em> portal-wide definition: the header badge, the bulk-approve button, and the nurse's worklist all read the same signal, so 0.85 is enforced in exactly one place. <code>entityMap()</code>, <code>ids()</code>, and <code>entities()</code> are provided signals — the map for lookups, the array for rendering.</p>`
    },
    { heading: "Optimistic approve/deny with rollback",
      html: `
<p>A nurse reviewer approves dozens of requests per hour. If every click waits for the API round trip, the queue feels broken — but if you update the UI first and the API rejects the decision (eligibility lapsed, another reviewer got there first), you must undo it honestly. The pattern has three beats: <strong>snapshot, patch, and on failure restore the snapshot</strong>.</p>
<pre><code class="language-ts">// inside withMethods, alongside load():
async decide(id: string, decision: 'APPROVED' | 'DENIED'): Promise&lt;void&gt; {
  const prev = store.entityMap()[id];
  if (!prev || prev.status !== 'IN_REVIEW') return; // guard: only reviewable rows

  // 1. optimistic: the queue reflects the decision immediately
  patchState(store, updateEntity({
    id, changes: { status: decision, decidedBy: 'REVIEWER' },
  }));

  try {
    // 2. confirm: server response is canonical (it may PEND instead)
    const confirmed = await firstValueFrom(api.decide(id, decision));
    patchState(store, updateEntity({ id, changes: confirmed }));
  } catch {
    // 3. rollback: restore the exact snapshot, tell the reviewer why
    patchState(store, updateEntity({ id, changes: prev }),
      { error: 'Decision for request ' + id + ' was rejected — restored' });
  }
},
approve(id: string) { return this.decide(id, 'APPROVED'); },
deny(id: string)    { return this.decide(id, 'DENIED'); },</code></pre>
<p>Two details carry the weight. The snapshot is the <em>entity</em>, not just the status — if the row had a <code>PENDED</code>-related note or score change in flight, restoring only <code>status</code> would corrupt it. And the success path also patches, because the server is the source of truth: <code>ClinicalCriteria</code> may re-evaluate on decision and the response can differ from your optimistic guess. For streams instead of promises — say the 3.1 poll feeding the store — <code>rxMethod</code> from <code>@ngrx/signals/rxjs-interop</code> is the same idea with an operator pipeline; use it when cancellation or concurrency control (switchMap, exhaustMap) matters.</p>`
    },
    { heading: "Full NgRx: when the event-sourced model earns its ceremony",
      html: `
<p>Classic NgRx is a different theory of state. You don't call a method; you dispatch an <strong>action</strong> ("Approve clicked for PA-1042"). A pure <strong>reducer</strong> folds actions into state; <strong>effects</strong> listen to the action stream and run the API calls; selectors derive views. Every change is an event in a log, and that log is the product: Redux DevTools can replay it, any feature can react to any action without the emitter knowing, and reducers are trivially testable.</p>
<table><tr><th>Concern</th><th>SignalStore</th><th>Full NgRx</th></tr>
<tr><td>Write model</td><td>Direct method call</td><td>Dispatched action through a reducer</td></tr>
<tr><td>Files per feature</td><td>One store file</td><td>Actions, reducer, effects, selectors</td></tr>
<tr><td>Async</td><td>Methods / rxMethod</td><td>Effects listening to the action stream</td></tr>
<tr><td>Traceability</td><td>Ordinary stack traces</td><td>Replayable action log, time-travel debugging</td></tr>
<tr><td>Decoupling</td><td>Callers know the store</td><td>Emitters never know the handlers</td></tr>
<tr><td>Cost</td><td>Low ceremony, less indirection</td><td>High ceremony, buys audit and fan-out</td></tr></table>
<p>The ceremony earns itself when the event log is genuinely load-bearing: several features must react to the same action without coupling to each other, you need time-travel reproduction of production bugs, or a large multi-team codebase needs the rigid convention as a guardrail. It does <em>not</em> earn itself just because an app is "big" — indirection you don't cash in is pure tax. And the two share a foundation now: NgRx selectors are signals in modern versions, so this is a choice of write model, not of reactivity.</p>`
    },
    { heading: "In the Prior Auth Portal",

<p>The portal ships <code>ReviewQueueStore</code> as built here — SignalStore, not full NgRx — and the reasoning is worth stating the way you would in a design review. One team owns the review queue, so nobody needs action-level decoupling from themselves. The audit trail that a healthcare workflow genuinely requires lives in the NestJS backend's event history, not in a browser tab that closes. And when intake and the provider directory eventually need to hear about decisions, they'll be separate micro-frontends — that's cross-MFE messaging in 4.5, which no in-app store solves anyway.</p>

/* ── MOD 3.3 ── */
{
  id: "3.3",
  track: 3,
  title: "Change Detection Deep Dive & Zoneless",
  duration: "60 min",
  objectives: [
    "Explain how zone.js patches async APIs and why one keystroke re-checks the entire component tree",
    "Apply ChangeDetectionStrategy.OnPush and honor its reference-equality contract",
    "Use signals to give the review queue precise, per-component dirty-marking",
    "Bootstrap the portal with provideZonelessChangeDetection and verify every state change still renders",
    "Read an Angular DevTools profiler recording to find wasted change-detection work"
  ],
  sections: [
    { heading: "Why does typing one letter re-render 200 rows?",
      html: `
<p>A nurse reviewer opens the review queue: 200 <code>IN_REVIEW</code> requests, a member-name filter box at the top. She types five letters and the page stutters. Nothing in those 200 rows changed — so why did Angular touch them?</p>
<p>Because by default Angular doesn't know <em>what</em> changed, only <em>that something might have</em>. The messenger is <strong>zone.js</strong>, loaded via polyfills. At startup it monkey-patches every async API in the browser — <code>setTimeout</code>, <code>Promise.then</code>, <code>addEventListener</code>, <code>XMLHttpRequest</code>, <code>fetch</code>:</p>
<pre><code class="language-ts">// What zone.js does at load time (conceptually):
const realSetTimeout = window.setTimeout;
window.setTimeout = (fn: Function, ms: number) =&gt;
  realSetTimeout(() =&gt; {
    fn();                    // your callback runs...
    zone.onTaskDone();       // ...then: "async work finished —
  }, ms);                    //  Angular, something MAY have changed"</code></pre>
<p>When the zone reports quiet (<code>onMicrotaskEmpty</code>), Angular calls <code>ApplicationRef.tick()</code>: walk the component tree from the root, re-evaluate <strong>every binding in every view</strong>, compare to the previous value, patch the DOM where it differs. With 200 rows at roughly 6 bindings each, one keystroke — which fires <code>keydown</code>, <code>input</code>, and <code>keyup</code> — costs ~3,600 binding checks to change one <code>&lt;input&gt;</code>'s value. Dirty checking is correct and safe; it is just maximally pessimistic.</p>
<div class="callout">Default change detection answers "did anything change?" by checking everything. The rest of this module is about giving Angular a better answer: "only these components changed."</div>`
    },
    { heading: "OnPush: the reference-equality contract",
      html: `
<p>The first precision tool predates signals: <code>ChangeDetectionStrategy.OnPush</code>. An OnPush component tells Angular "skip me during tick() unless one of these happened": an input received a <strong>new reference</strong>, an event handler fired inside my own template, an <code>async</code> pipe in my template emitted, or someone called <code>markForCheck()</code>.</p>
<pre><code class="language-ts">@Component({
  selector: 'pa-auth-request-row',
  changeDetection: ChangeDetectionStrategy.OnPush,
  template: \`
    &lt;span class="mono"&gt;{{ request().id }}&lt;/span&gt;
    &lt;span&gt;{{ request().member.lastName }}&lt;/span&gt;
    &lt;span [class]="request().status"&gt;{{ request().status }}&lt;/span&gt;
    &lt;button (click)="approve.emit(request().id)"&gt;Approve&lt;/button&gt;
  \`
})
export class AuthRequestRow {
  request = input.required&lt;AuthRequest&gt;();   // signal input, from 2.8
  approve = output&lt;string&gt;();
}</code></pre>
<p>Now keystrokes in the filter box no longer check the 200 rows — their inputs didn't change. But OnPush is a <em>contract</em>, and the price is immutability. Mutate a request in place and the reference stays the same, so the row is skipped and the screen silently lies:</p>
<pre><code class="language-ts">// WRONG under OnPush — same object reference, row never re-renders:
const row = this.rows().find(r =&gt; r.id === id)!;
row.status = 'APPROVED';

// RIGHT — the 3.2 SignalStore pattern: replace the object, never mutate it
this.rows.update(rows =&gt; rows.map(r =&gt;
  r.id === id ? { ...r, status: 'APPROVED' as const } : r
));</code></pre>
<p>This is why the <code>ReviewQueueStore</code> in 3.2 insisted on immutable entity updates for approve/deny. It wasn't style — it was pre-paying for this module.</p>`
    },
    { heading: "Signals: precise dirty-marking instead of tree-walking",
      html: `
<p>OnPush prunes the tree walk, but Angular still starts at the root and descends, asking each component "may I skip you?". Signals invert the flow: when a template reads a signal, that view registers itself as a <strong>consumer</strong>. When the signal is written, Angular marks <em>exactly those consumer views</em> dirty and schedules a render that goes straight to them — no guessing, no full traversal.</p>
<pre><code class="language-ts">// ReviewQueueStore (3.2) — state and derivation are signals (2.6)
readonly filter = signal('');
readonly filteredRows = computed(() =&gt; {
  const term = this.filter().toLowerCase();
  return this.rows().filter(r =&gt;

<p>So the migration checklist is short but strict: (1) components are signals-based, or OnPush with disciplined <code>markForCheck()</code> after every out-of-band write; (2) no plain class fields mutated in async callbacks — make them signals or pipe them through <code>toSignal</code> from 2.7; (3) no libraries that depend on the zone for their own scheduling (audit anything that says "runs outside Angular" or predates v17).</p>

<p>Since 2.8 the queue and the detail panel talk through <code>input()</code> and <code>output()</code>. Now the detail panel needs the same visual chrome — bordered section, header, action footer — that the new clinical-criteria panel needs. Copy-pasting the markup means every spacing tweak lands twice and drifts. The "pass everything as inputs" alternative dies just as fast: a <code>title</code> string input works until the header needs a live status badge, and an HTML-string input rendered through <code>innerHTML</code> is sanitized, unbound, and untyped.</p>
<p><strong>Content projection</strong> splits ownership cleanly: the panel owns structure and styling, the caller owns what goes inside. <code>&lt;ng-content /&gt;</code> marks where the caller's markup lands:</p>
<pre><code class="language-ts">// shared/panel.component.ts — v1: one slot

<p><code>viewChild</code> finds templates in your own view; <code>contentChild</code> finds templates a caller projected between your tags — that second one is the key to the next section. One more tool before we stamp anything: <code>&lt;ng-container&gt;</code> is a grouping element that hosts directives and outlets but emits <strong>no DOM element at all</strong>. In the queue's CSS grid, a wrapper <code>div</code> per row would break the column layout; <code>ng-container</code> leaves no trace.</p>`

<pre><code class="language-ts">// shared/request-list.component.ts
import { Component, contentChild, input, TemplateRef } from '@angular/core';
import { NgTemplateOutlet } from '@angular/common';
import { AuthRequest } from '../domain/models';

export interface RowContext {
  $implicit: AuthRequest;   // the bare let- variable
  index: number;            // named: let-i="index"
  overdue: boolean;         // named: let-overdue="overdue"

@Component({
  selector: 'pa-request-list',
  imports: [NgTemplateOutlet],
  template: \`
    @for (req of requests(); track req.id) {
      &lt;ng-container
        [ngTemplateOutlet]="rowTpl()"
        [ngTemplateOutletContext]="{ $implicit: req, index: $index, overdue: isOverdue(req) }" /&gt;
    }

  readonly rowTpl = contentChild.required&lt;TemplateRef&lt;RowContext&gt;&gt;('row');

    return req.status === 'IN_REVIEW' &amp;&amp; req.urgency === 'EXPEDITED';

{
  id: "3.5",
  track: 3,
  title: "Custom Directives & Host Bindings",
  duration: "60 min",
  objectives: [
    "Choose correctly between an attribute directive and a structural directive for a cross-cutting behavior",
    "Declare host bindings and listeners with the host metadata object instead of the legacy @HostBinding/@HostListener decorators",
    "Build the paPermission structural directive over TemplateRef and ViewContainerRef, driven by a role signal",
    "Compose reusable directives onto components with hostDirectives and expose directive state to templates with exportAs"
  ],
  sections: [
    { heading: "A rule that belongs to no single component",
      html: `
<p>The Review Queue detail panel shows Approve, Deny, and Pend buttons for any <code>IN_REVIEW</code> <code>AuthRequest</code>. Compliance has a problem with that: an intake coordinator opening a request sees a Deny button they are not authorized to use. The backend rejects the call, but the UI is lying about what this user can do — and the same lie will repeat on every screen that ever renders a decision control.</p>
<p>"Render this content only if the current user's role allows the action" is not one component's logic. It's a portal-wide rule, and portal-wide element behavior is what directives are for. In 1.6 you built <code>highlightOverdue</code>, an <strong>attribute directive</strong>: it decorates an element that already exists. Today's rule is different in kind — the Deny button must <em>not exist</em> for a coordinator, not merely look disabled. That demands a <strong>structural directive</strong>: one that decides whether its content is instantiated at all.</p>
<table><tr><th>Kind</th><th>Owns</th><th>Typical tools</th><th>Portal example</th></tr>
<tr><td>Attribute</td><td>An existing element's state and events</td><td>host bindings, host listeners, signal inputs</td><td><code>highlightOverdue</code> (1.6)</td></tr>
<tr><td>Structural</td><td>Whether a template renders, and how often</td><td>TemplateRef, ViewContainerRef</td><td><code>paPermission</code> (this module)</td></tr></table>
<p>The built-in <code>@if</code>/<code>@for</code>/<code>@switch</code> from 1.4 replaced everyday structural directives — you will never write your own loop. But <code>@if</code> can only test an expression the component hands it. When the condition is a cross-cutting policy with its own dependencies (a user service, a permission map), packaging it as a custom structural directive keeps the policy in one file instead of copy-pasted <code>@if</code> conditions across three teams' templates.</p>`
    },
    { heading: "The host object: bindings and listeners without decorators",
      html: `
<p>Before building the structural directive, finish the attribute-directive story. In 1.6 the <code>host</code> object bound a class and an aria attribute. It also handles <em>events</em> — which used to require the <code>@HostBinding</code> and <code>@HostListener</code> decorators scattered across class members. The decorators still compile, but the Angular style guide now prefers the <code>host</code> object: every interaction with the host element is declared in one place, in the same metadata you already read for the selector.</p>
<p>Here is a second shared directive the portal needs: denying care is consequential, so the Deny button requires a two-click confirmation. First click arms it, second click emits; moving the pointer away or pressing Escape disarms.</p>
<pre><code class="language-ts">import { Directive, output, signal } from '@angular/core';

@Directive({
  selector: '[paDangerAction]',
  exportAs: 'paDangerAction',
  host: {
    '[class.armed]': 'armed()',
    '[attr.aria-label]': "armed() ? 'Click again to confirm' : null",
    '(click)': 'onClick($event)',
    '(mouseleave)': 'disarm()',
    '(keydown.escape)': 'disarm()',
  },
})
export class DangerActionDirective {
  confirmed = output&lt;void&gt;();
  armed = signal(false);

  onClick(event: MouseEvent): void {
    if (this.armed()) {
      this.confirmed.emit();
      this.armed.set(false);
    } else {
      event.stopPropagation();
      this.armed.set(true);
    }
  }

  disarm(): void { this.armed.set(false); }
}</code></pre>
<p>Read the <code>host</code> keys: square brackets are property/class/attribute bindings evaluated against the directive instance (signals included), parentheses are event listeners, and pseudo-event syntax like <code>keydown.escape</code> works exactly as it does in templates. The legacy spelling of the first and third entries would be a <code>@HostBinding('class.armed')</code> getter and a <code>@HostListener('click', ['$event'])</code> method — same behavior, but the element's contract ends up smeared across the class body instead of declared once at the top.</p>`
    },
    { heading: "How structural directives actually work: TemplateRef and ViewContainerRef",
      html: `
<p>Why can a structural directive make content <em>not exist</em>? Because it never receives rendered DOM — it receives a blueprint. When you prefix an attribute with <code>*</code>, the compiler desugars the element into an <code>&lt;ng-template&gt;</code>:</p>
<pre><code class="language-html">&lt;button *paPermission="'DENY'"&gt;Deny&lt;/button&gt;

&lt;!-- desugars to: --&gt;
&lt;ng-template [paPermission]="'DENY'"&gt;
  &lt;button&gt;Deny&lt;/button&gt;
&lt;/ng-template&gt;</code></pre>
<p>An <code>&lt;ng-template&gt;</code> renders nothing. Its contents are compiled but inert until someone instantiates them. The directive sitting on it can inject two things:</p>
<table><tr><th>Injected</th><th>What it is</th></tr>
<tr><td><code>TemplateRef</code></td><td>The blueprint — the wrapped content, compiled but not instantiated</td></tr>
<tr><td><code>ViewContainerRef</code></td><td>The anchor in the DOM where embedded views can be created and destroyed</td></tr></table>
<p>Calling <code>viewContainer.createEmbeddedView(templateRef)</code> stamps the blueprint into the container; <code>viewContainer.clear()</code> destroys it. That's the entire trick — it is the same machinery <code>@if</code> compiles down to, and the same <code>ng-template</code>/<code>ngTemplateOutlet</code> pair you used for projection contexts in 3.4. No instantiation means no component construction, no event listeners, no node in the Elements panel. Compare that to hiding with CSS: a display-none Deny button still exists, still has a click handler, and still shows up when a curious user pokes the DOM.</p>`
    },
    { heading: "Building paPermission",
      html: `
<p>Now assemble it. Roles come from a <code>CurrentUserService</code> whose <code>role</code> is a signal (populated from the auth token the same way the interceptor in 2.5 reads it). The policy is a single exhaustive map — the <code>Record</code> move from 1.1, so adding an action without assigning roles fails to compile.</p>
<pre><code class="language-ts">import {
  Directive, TemplateRef, ViewContainerRef,
  computed, effect, inject, input,
} from '@angular/core';
import { CurrentUserService } from '../auth/current-user.service';

export type PortalRole =
  | 'NURSE_REVIEWER' | 'MEDICAL_DIRECTOR' | 'INTAKE_COORDINATOR';
export type PortalAction =
  | 'APPROVE' | 'DENY' | 'PEND' | 'SUBMIT_INTAKE';

const ALLOWED_ROLES: Record&lt;PortalAction, readonly PortalRole[]&gt; = {
  APPROVE:       ['NURSE_REVIEWER', 'MEDICAL_DIRECTOR'],
  DENY:          ['NURSE_REVIEWER', 'MEDICAL_DIRECTOR'],
  PEND:          ['NURSE_REVIEWER', 'MEDICAL_DIRECTOR'],
  SUBMIT_INTAKE: ['INTAKE_COORDINATOR'],
};

@Directive({
  selector: '[paPermission]',
  exportAs: 'paPermission',
})
export class PaPermissionDirective {
  action = input.required&lt;PortalAction&gt;({ alias: 'paPermission' });

  private templateRef = inject(TemplateRef&lt;unknown&gt;);
  private viewContainer = inject(ViewContainerRef);
  private currentUser = inject(CurrentUserService);

  allowed = computed(() =&gt;
    ALLOWED_ROLES[this.action()].includes(this.currentUser.role())
  );

  constructor() {
    effect(() =&gt; {
      this.viewContainer.clear();
      if (this.allowed()) {
        this.viewContainer.createEmbeddedView(this.templateRef);
      }
    });
  }
}</code></pre>
<p>The <code>effect</code> is the render loop: it reads <code>allowed()</code>, and because <code>computed</code> only notifies when its <em>value</em> changes, the view is created or destroyed exactly once per genuine permission flip — a role change mid-session (a medical director covering the queue) tears down or stamps in the button with no other component knowing. The detail panel template composes everything from this module and 1.6:</p>
<pre><code class="language-html">@if (request().status === 'IN_REVIEW') {
  &lt;button *paPermission="'APPROVE'" (click)="approve()"&gt;Approve&lt;/button&gt;
  &lt;button *paPermission="'DENY'" paDangerAction

<div class="callout">Hiding a control is UX, not authorization. The NestJS backend re-checks the role on every decision endpoint; <code>paPermission</code> exists so honest users never see actions that would 403. Never treat a frontend directive as the security boundary.</div>`

    { heading: "Composition: hostDirectives and exportAs",
      html: `
<p>Two finishing techniques make directives compose instead of accumulating. First, <strong>exportAs</strong>. The card's Deny button should read "Confirm denial" while armed — but <code>armed</code> lives on the directive, not the component. <code>exportAs: 'paDangerAction'</code> (declared above) lets the template grab the directive instance with a reference variable:</p>

  {{ danger.armed() ? 'Confirm denial' : 'Deny' }}
&lt;/button&gt;</code></pre>
<p>No output, no service, no duplicated state — the template reads the directive's signal directly. Second, the <strong>directive composition API</strong>. The <code>AuthRequestCardComponent</code> has carried <code>[highlightOverdue]="request()"</code> in every consuming template since 1.6. With <code>hostDirectives</code>, the component applies the directive to its own host element, and forwards its own input into it:</p>
<pre><code class="language-ts">@Component({

<p>Every card is now overdue-aware by construction — consumers write <code>&lt;pa-auth-request-card [request]="row" /&gt;</code> and the SLA class appears on the host automatically. Rules worth memorizing: host directives must be standalone; their inputs and outputs are <em>not</em> exposed unless you list them (the <code>'alias: exposedName'</code> mapping above renames <code>highlightOverdue</code> to <code>request</code>); and their host bindings merge onto the component's host element. Composition beats inheritance here for the same reason it does everywhere — the card gains behavior without a base-class hierarchy.</p>`
